<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commander Forge — MTG Deck Builder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f2ebe0; font-family: Georgia, 'Palatino Linotype', serif; color: #1e0f00; min-height: 100vh; }
    input, textarea, select { font-family: inherit; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #8a3010 !important; box-shadow: 0 0 0 2px rgba(138,48,16,0.12); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e8d8c0; }
    ::-webkit-scrollbar-thumb { background: #c09050; border-radius: 3px; }
    @keyframes spin    { from { transform: rotate(0deg)   } to { transform: rotate(360deg) } }
    @keyframes fadeIn  { from { opacity:0; transform:scale(.92) } to { opacity:1; transform:scale(1) } }
    .spin { animation: spin 2s linear infinite; display: inline-block; }
    .card { background: #fff; border: 1px solid #ddd0b8; border-radius: 12px; padding: 20px 24px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
    .pick-card { cursor: pointer; transition: border-color .15s, transform .15s, box-shadow .15s; }
    .pick-card:hover { border-color: #8a3010 !important; transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.12) !important; }
    .deck-card { background: #fdf8f2; border: 1px solid #e8d8b8; border-radius: 8px; padding: 7px 10px; display: flex; gap: 8px; align-items: center; }
    .deck-card:hover { border-color: #b87030; }
    .cmd-img { border-radius: 7px; box-shadow: 0 3px 12px rgba(0,0,0,0.18); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
  import { h, render } from "https://esm.sh/preact@10";
  import { useState, useCallback, useEffect, useRef } from "https://esm.sh/preact@10/hooks";
  import htm from "https://esm.sh/htm@3";
  const html = htm.bind(h);

  const LS_APIKEY     = "cmdr_forge_apikey";       // legacy single-key (migrated on load)
  const LS_PROVIDER   = "cmdr_forge_provider";     // primary/preferred provider
  const LS_MODEL      = "cmdr_forge_model";        // legacy single-model (migrated on load)
  const LS_KEY_GROQ   = "cmdr_forge_key_groq";     // dedicated key per provider
  const LS_KEY_GEMINI = "cmdr_forge_key_gemini";
  const LS_MODELS     = "cmdr_forge_models";       // { groq, gemini } — model per provider
  const LS_CARDS      = "cmdr_forge_cards";
  const LS_BINDERS    = "cmdr_forge_binders";
  const LS_COMMANDERS = "cmdr_forge_commanders";
  const LS_PREFS      = "cmdr_forge_prefs";
  const LS_LIBRARY    = "cmdr_forge_library";
  const LS_SF_CACHE   = "cmdr_forge_sf_cache";
  const LS_ARCH_CREDS = "cmdr_forge_archidekt_creds";  // { username, password }
  const LS_ARCH_TOKEN = "cmdr_forge_archidekt_token";  // bearer token from /api/users/login/
  const LS_USE_SHARED = "cmdr_forge_use_shared_gemini"; // "1" = route Gemini calls through host's key
  const SF_CACHE_TTL  = 7 * 24 * 60 * 60 * 1000;   // 7-day TTL for Scryfall card data
  // Relative URL — routed by the local Python proxy (proxy.py) to
  // https://archidekt.com/api, sidestepping browser CORS restrictions.
  // Direct calls to archidekt.com from a browser origin are blocked.
  const ARCH_API      = "/archidekt/api";

  // ── Cloud sync ──────────────────────────────────────────────────────────────
  // localStorage keys to push to the cloud KV store. Deliberately excludes
  // LS_SF_CACHE (huge, per-browser, regenerable) and LS_COMMANDERS (rebuilt
  // per-collection by Load Commanders). Everything else makes the user
  // experience portable across devices.
  const SYNC_KEYS = [
    LS_KEY_GROQ, LS_KEY_GEMINI, LS_PROVIDER, LS_MODELS,
    LS_CARDS, LS_BINDERS, LS_PREFS, LS_LIBRARY,
    LS_ARCH_CREDS, LS_ARCH_TOKEN,
    LS_USE_SHARED,
  ];
  // Push interval — debounce window for batching rapid changes (typing in
  // Settings, scrolling through preferences). 5 s gives a responsive feel
  // without spamming KV writes when only one thing changed.
  const SYNC_PUSH_INTERVAL_MS = 5000;

  function readSyncSnapshot() {
    const out = {};
    for (const k of SYNC_KEYS) {
      const v = localStorage.getItem(k);
      if (v !== null) out[k] = v;
    }
    return out;
  }
  function applySyncSnapshot(snapshot) {
    if (!snapshot || typeof snapshot !== "object") return 0;
    let changed = 0;
    for (const k of SYNC_KEYS) {
      const incoming = snapshot[k];
      const current  = localStorage.getItem(k);
      if (incoming === undefined || incoming === null) {
        if (current !== null) { localStorage.removeItem(k); changed++; }
      } else if (incoming !== current) {
        localStorage.setItem(k, incoming);
        changed++;
      }
    }
    return changed;
  }
  // Order-insensitive "is this snapshot equivalent to that snapshot" check.
  function snapshotHash(snapshot) {
    if (!snapshot) return "";
    const keys = Object.keys(snapshot).sort();
    return keys.map(k => `${k}=${snapshot[k]}`).join("\x1e");
  }

  // Scryfall set codes for Magic's "joke" sets, none of which are legal in EDH.
  //   ugl = Unglued · unh = Unhinged · ust = Unstable · und = Unsanctioned
  //   unf = Unfinity · h17 = Heroes of the Realm
  // Stored lowercase; compared case-insensitively in isEDHLegalCard.
  const UN_SET_CODES = new Set(["ugl","unh","ust","und","unf","h17"]);

  const PROVIDERS = {
    groq: {
      label: "Groq", keyHint: "gsk_…", keyUrl: "console.groq.com",
      models: [
        { id:"llama-3.3-70b-versatile", label:"Llama 3.3 70B (best quality)" },
        { id:"llama-3.1-8b-instant",    label:"Llama 3.1 8B (faster)" },
        { id:"gemma2-9b-it",            label:"Gemma 2 9B" },
      ],
    },
    gemini: {
      label: "Google Gemini", keyHint: "AIza…", keyUrl: "aistudio.google.com",
      // GA models only — May-2025 preview SKUs (`*-preview-05-20`, `*-preview-05-06`)
      // were retired once 2.5 Flash/Pro hit GA and now return 404.
      models: [
        { id:"gemini-2.5-flash",      label:"Gemini 2.5 Flash (recommended)" },
        { id:"gemini-2.5-pro",        label:"Gemini 2.5 Pro (slower, stronger)" },
        { id:"gemini-2.0-flash",      label:"Gemini 2.0 Flash" },
        { id:"gemini-2.0-flash-lite", label:"Gemini 2.0 Flash Lite (fastest)" },
      ],
    },
  };

  // ── Scryfall ────────────────────────────────────────────────────────────────
  // Returns { data: [...], error: string|null }.  Retries up to 3× on 429 / 5xx
  // with exponential backoff so a transient rate-limit doesn't silently drop
  // a whole batch of 75 cards (the bug that caused "fewer commanders than expected"
  // after a cache clear).
  async function fetchBatch(cards) {
    const body = JSON.stringify({
      identifiers: cards.map(c => c.id ? { id: c.id } : { name: c.name }),
    });
    let lastErr = null;
    for (let attempt = 0; attempt < 4; attempt++) {
      try {
        const r = await fetch("https://api.scryfall.com/cards/collection", {
          method: "POST", headers: { "Content-Type": "application/json" }, body,
        });
        if (r.ok) return { data: (await r.json()).data || [], error: null };
        // Retry on rate-limit (429) or transient server errors (5xx).
        if (r.status === 429 || r.status >= 500) {
          lastErr = `HTTP ${r.status}`;
          // Honor Retry-After header if Scryfall supplies one (in seconds).
          const ra = parseInt(r.headers.get("Retry-After")) || 0;
          const wait = ra > 0
            ? ra * 1000
            : Math.min(8000, 500 * Math.pow(2, attempt));   // 0.5/1/2/4s capped at 8s
          await new Promise(res => setTimeout(res, wait));
          continue;
        }
        return { data: [], error: `HTTP ${r.status}` };   // 4xx (other than 429) — don't retry
      } catch (e) {
        lastErr = e.message || "network";
        await new Promise(res => setTimeout(res, Math.min(8000, 500 * Math.pow(2, attempt))));
      }
    }
    return { data: [], error: lastErr || "unknown" };
  }

  // Standard basic lands (5 colours + Wastes). We have hardcoded image URIs and
  // metadata for these (BASIC_IMG / BASIC_LAND maps further down), so there's no
  // need to call Scryfall for them — they bloat the fetch and contribute to
  // rate-limit pressure on large collections.
  // Snow-covered basics are deliberately excluded here: they have distinct
  // Scryfall data (different art, different inclusion in colour-identity for
  // some snow-themed commanders) so we still fetch those.
  const SF_SKIP_NAMES = new Set(["Plains", "Island", "Swamp", "Mountain", "Forest", "Wastes"]);

  // Build a stub Scryfall record for plain basics (no API call needed). Used
  // when we want a basic land to appear in `enriched` output with image / type
  // line / colour identity for downstream rendering.
  function basicLandStub(name) {
    const colorIdentity = { Plains:["W"], Island:["U"], Swamp:["B"], Mountain:["R"], Forest:["G"] }[name] || [];
    return {
      id: `basic-${name.toLowerCase()}`, name, layout: "normal",
      mana_cost: "", cmc: 0, type_line: `Basic Land — ${name}`,
      oracle_text: "", color_identity: colorIdentity,
      image_uris: { small: BASIC_IMG[name], normal: BASIC_IMG[name] },
      set: "", set_type: "core", border_color: "black",
      commander_legal: true,
    };
  }

  // Slim-down a full Scryfall object to only the fields Commander Forge uses.
  // Keeps cache size manageable (~0.5 KB/card vs ~5 KB/card for the full object).
  function slimSF(sf) {
    const s = {
      id: sf.id, name: sf.name, layout: sf.layout,
      mana_cost: sf.mana_cost, type_line: sf.type_line,
      oracle_text: sf.oracle_text, color_identity: sf.color_identity,
      cmc: sf.cmc, power: sf.power, toughness: sf.toughness, loyalty: sf.loyalty,
      edhrec_rank: sf.edhrec_rank,    // popularity rank on EDHRec (lower = more popular)
      // Legality + provenance — used to reject Unfinity/silver-border/emblem cards.
      border_color: sf.border_color,  // "black" | "silver" (un-set) | "gold" (promo) | "white"
      set:               (sf.set || "").toLowerCase(),  // 3-letter set code, e.g. "unf"
      set_name:          sf.set_name,      // full set name, e.g. "Commander 2021"
      set_type:          sf.set_type,      // "funny" = Unfinity / Un-sets
      collector_number:  sf.collector_number,  // per-printing identifier — used to push the EXACT version to Archidekt
      commander_legal: sf.legalities?.commander === "legal",
    };
    if (sf.image_uris)
      s.image_uris = { small: sf.image_uris.small, normal: sf.image_uris.normal };
    if (sf.card_faces)
      s.card_faces = sf.card_faces.map(f => ({
        name: f.name, mana_cost: f.mana_cost,
        type_line: f.type_line, oracle_text: f.oracle_text,
        image_uris: f.image_uris
          ? { small: f.image_uris.small, normal: f.image_uris.normal } : undefined,
      }));
    if (sf.prices) s.prices = { usd: sf.prices.usd };
    if (sf.related_uris?.edhrec)
      s.related_uris = { edhrec: sf.related_uris.edhrec };  // canonical EDHRec slug source
    return s;
  }

  function getSFCache() {
    try { return JSON.parse(localStorage.getItem(LS_SF_CACHE) || "{}"); } catch { return {}; }
  }
  function setSFCache(cache) {
    try {
      localStorage.setItem(LS_SF_CACHE, JSON.stringify(cache));
    } catch {
      // Storage quota exceeded — evict the oldest 25 % of entries and retry.
      try {
        const entries = Object.entries(cache).sort((a, b) => a[1].ts - b[1].ts);
        const trimmed = Object.fromEntries(entries.slice(Math.ceil(entries.length * 0.25)));
        localStorage.setItem(LS_SF_CACHE, JSON.stringify(trimmed));
      } catch {}
    }
  }

  // Caller can pass `onLog` to receive human-readable status lines (cache
  // hit/miss counts, batch progress) — wired to the build log in the UI.
  async function fetchAllScryfall(cards, onProgress, onLog) {
    const log = msg => { if (typeof onLog === "function") onLog(msg); };
    const cache = getSFCache();
    const now   = Date.now();
    const out   = [], toFetch = [];

    // ── Pass 0: stub basic lands locally (no Scryfall call needed) ──────
    let basicsStubbed = 0;
    for (const card of cards) {
      if (SF_SKIP_NAMES.has(card.name)) {
        out.push({ ...card, scryfall: basicLandStub(card.name) });
        basicsStubbed++;
        continue;
      }
      const key = (card.id || card.name).toLowerCase();
      const hit = cache[key];
      if (hit && (now - hit.ts) < SF_CACHE_TTL) {
        out.push({ ...card, scryfall: hit.d });
      } else {
        toFetch.push(card);
      }
    }
    if (basicsStubbed > 0) log(`✓ ${basicsStubbed} basic lands handled locally (no API call needed).`);

    log(`📦 Cache: ${out.length - basicsStubbed}/${cards.length - basicsStubbed} non-basic cards served instantly` +
        (toFetch.length ? `, fetching ${toFetch.length} from Scryfall…` : "."));

    if (toFetch.length === 0) { if (onProgress) onProgress(100); return out; }

    // BATCH=75 stays (Scryfall's documented per-request maximum). PAR was 4
    // but caused 429s (rate limit) on large 2000+ card collections after the
    // first ~16 batches — Scryfall's burst tolerance is lower than 4×75
    // identifiers per second sustained. PAR=2 is well within their guidance
    // of "≤10 requests/sec" and avoids the silent stall.
    const BATCH = 75, PAR = 2;
    const batches = [];
    for (let i = 0; i < toFetch.length; i += BATCH) batches.push(toFetch.slice(i, i + BATCH));
    let cacheUpdated = false;
    const errors = [];        // { error, batch_size }
    let unmatched = 0;        // cards we asked Scryfall about but couldn't pair back
    let liveErrorReported = false;

    for (let i = 0; i < batches.length; i += PAR) {
      const grp = batches.slice(i, i + PAR);
      const res = await Promise.all(grp.map(fetchBatch));
      res.forEach(({ data, error }, bi) => {
        const batch = grp[bi];
        if (error) {
          errors.push({ error, batch_size: batch.length });
          // Surface the FIRST live error immediately — silent stalls were
          // confusing users when Scryfall rate-limited mid-import.
          if (!liveErrorReported) {
            log(`⚠️ Scryfall batch failed (${error}). Continuing — affected cards will be missing from analysis.`);
            liveErrorReported = true;
          }
          return;
        }
        const matched = new Set();
        data.forEach(sf => {
          const loc = batch.find(c => c.id === sf.id || c.name.toLowerCase() === sf.name.toLowerCase());
          if (loc) {
            matched.add(loc.name.toLowerCase());
            const key = (loc.id || loc.name).toLowerCase();
            cache[key] = { d: slimSF(sf), ts: now };
            out.push({ ...loc, scryfall: sf });
            cacheUpdated = true;
          }
        });
        unmatched += batch.length - matched.size;
      });
      if (onProgress) onProgress(Math.round(Math.min(((i + PAR) / batches.length) * 100, 100)));
      const done = Math.min(i + PAR, batches.length);
      // Log every batch group so the user sees motion (avoids the silent
      // "Loading…" hang for large collections).
      log(`   …${done}/${batches.length} batches fetched (${out.length}/${cards.length} cards ready)`);
    }

    if (cacheUpdated) setSFCache(cache);
    fetchAllScryfall.lastErrors    = errors;
    fetchAllScryfall.lastUnmatched = unmatched;
    fetchAllScryfall.lastRequested = cards.length;
    return out;
  }

  // ── EDHRec ───────────────────────────────────────────────────────────────────
  // Fallback slugifier — only used when Scryfall didn't provide a canonical URL
  // (extremely rare; Scryfall populates related_uris.edhrec for nearly all cards).
  function edhrecSlug(name) {
    return name
      .toLowerCase()
      .normalize("NFD").replace(/[̀-ͯ]/g, "") // strip diacritics
      .split(/\s\/\/\s/)[0]                              // DFC: front face only
      .replace(/[',!.:?()\/]/g, "")
      .replace(/[\s\-]+/g, "-")
      .replace(/-+/g, "-")
      .replace(/^-|-$/g, "");
  }

  // Extract the canonical EDHRec slug from Scryfall's related_uris.edhrec URL.
  // Scryfall produces clean slug URLs (https://edhrec.com/commanders/<slug>)
  // for most cards, BUT for many recent DFCs (e.g. Sephiroth, Universes Beyond
  // transform commanders) it instead returns a routing URL of the form
  //   https://edhrec.com/route/?cc=<urlencoded+name>
  // — that's a frontend redirect, not a slug. Treat any URL whose tail looks
  // like a query string ("?cc=…") or whose path is `/route/` as unusable and
  // fall back to slugging the front-face name ourselves.
  function edhrecSlugFromScryfall(sf) {
    const url = sf?.related_uris?.edhrec;
    if (url && !/\/route\/?\??/.test(url)) {
      const tail = url.replace(/\/+$/, "").split("/").pop();
      if (tail && !tail.startsWith("?")) return tail;
    }
    if (sf?.name) return edhrecSlug(sf.name);
    return null;
  }

  // Endpoints we try in order. `null` = direct fetch (no proxy). When the direct
  // call hits Cloudflare's bot fingerprinting and is blocked by CORS, we transparently
  // retry through public CORS proxies. These proxies are third-party services —
  // they see the URL but not your API keys (we don't send any to EDHRec).
  const EDHREC_PROXIES = [
    // The local Python proxy (proxy.py) handles same-origin EDHRec / Spellbook
    // requests — most reliable, no third-party rate limits. Falls through
    // for unknown hosts so other proxies can pick up the request.
    { name: "local", wrap: u => u
        .replace(/^https?:\/\/json\.edhrec\.com/,             "/edhrec")
        .replace(/^https?:\/\/backend\.commanderspellbook\.com/, "/spellbook") },
    { name: "direct",         wrap: u => u },
    { name: "corsproxy.io",   wrap: u => `https://corsproxy.io/?url=${encodeURIComponent(u)}` },
    { name: "allorigins.win", wrap: u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` },
  ];

  // Returns { suggestions, status, slug, via?, http? }
  // status: "ok" | "no_page" | "network" | "empty" | "no_slug"
  // Pass either a Scryfall card object (preferred — uses canonical slug) or a string name.
  async function fetchEDHRec(scryfallOrName) {
    const sf   = typeof scryfallOrName === "object" ? scryfallOrName : null;
    const slug = sf ? edhrecSlugFromScryfall(sf)
                    : (scryfallOrName ? edhrecSlug(scryfallOrName) : null);
    if (!slug) return { suggestions: [], status: "no_slug" };

    const target = `https://json.edhrec.com/pages/commanders/${slug}.json`;
    let lastErr = null, lastHttp = null;

    for (const { name, wrap } of EDHREC_PROXIES) {
      let r;
      try {
        r = await fetch(wrap(target));
      } catch (e) {
        // TypeError "Failed to fetch" usually means CORS — try next proxy.
        lastErr = `${name}: ${(e.message || "network").slice(0, 80)}`;
        continue;
      }
      // 404 means EDHRec genuinely has no page for this slug — no proxy will help.
      // 403 from json.edhrec.com is the same situation: their CDN serves
      // "AccessDenied" XML for any path that doesn't map to a known commander
      // page, instead of a proper 404. Treat it as "no_page" too.
      if (r.status === 404 || r.status === 403)
        return { suggestions: [], status: "no_page", slug, via: name, http: r.status };
      if (!r.ok) {
        lastErr = `${name}: HTTP ${r.status}`;
        lastHttp = r.status;
        continue;
      }

      let data;
      try { data = await r.json(); }
      catch { return { suggestions: [], status: "empty", slug, via: name }; }

      const cardlists = data?.container?.json_dict?.cardlists || [];
      const byName = new Map();
      cardlists.forEach(list => {
        (list.cardviews || []).forEach(cv => {
          if (!cv.name) return;
          const syn = typeof cv.synergy   === "number" ? cv.synergy   : 0;
          const inc = typeof cv.inclusion === "number" ? cv.inclusion : 0;
          if (!byName.has(cv.name) || syn > byName.get(cv.name).synergy) {
            byName.set(cv.name, { name: cv.name, synergy: syn, inclusion: inc });
          }
        });
      });
      const suggestions = [...byName.values()].sort((a, b) => b.synergy - a.synergy);
      return { suggestions, status: suggestions.length ? "ok" : "empty", slug, via: name };
    }

    return { suggestions: [], status: "network", slug, http: lastHttp, error: lastErr };
  }

  // ── Commander Spellbook ──────────────────────────────────────────────────────
  // Public combo database. Given a commander + card pool, returns:
  //   - `have`:   combos achievable with cards already in the pool
  //   - `almost`: combos that need 1-2 more cards (acquire suggestions)
  // Reuses the EDHREC_PROXIES chain because the same Cloudflare bot fingerprinting
  // can intermittently affect this endpoint.
  function shapeCSPBVariant(v) {
    const useNames = (v.uses || [])
      .map(u => u?.card?.name)
      .filter(Boolean);
    const produces = (v.produces || [])
      .map(p => p?.feature?.name)
      .filter(Boolean);
    return {
      id: v.id,
      cards: useNames,
      produces,
      description: (v.description || "").slice(0, 600),
      identity: v.identity,
      color_identity: v.color_identity,
    };
  }

  async function fetchCommanderSpellbook(commanderName, cardPool) {
    if (!commanderName) return { status: "no_commander", have: [], almost: [] };
    const target = "https://backend.commanderspellbook.com/find-my-combos/";
    // API constraints (verified live, 2026-05):
    //   • Each entry must be an object `{ card, quantity }` (not a bare string)
    //   • `main` is capped at 600 elements — anything more returns HTTP 400
    //   • The commander goes in `commanders[]` only — duplicating it in `main[]`
    //     is wasted budget against the 600-element cap.
    const cmdrLower = commanderName.toLowerCase();
    const mainNames = (cardPool || [])
      .filter(n => n && n.toLowerCase() !== cmdrLower)
      .slice(0, 600);
    const body = JSON.stringify({
      commanders: [{ card: commanderName, quantity: 1 }],
      main: mainNames.map(name => ({ card: name, quantity: 1 })),
    });

    let lastErr = null;
    for (const { name, wrap } of EDHREC_PROXIES) {
      let r;
      try {
        // Some proxies (allorigins /raw) don't forward POST bodies; we encode
        // the proxy URL but still POST directly through it. corsproxy.io does
        // forward bodies. allorigins requires a different mode for POST so we
        // skip it for POST requests.
        if (name === "allorigins.win") continue;
        r = await fetch(wrap(target), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body,
        });
      } catch (e) {
        lastErr = `${name}: ${(e.message || "network").slice(0, 80)}`;
        continue;
      }
      if (!r.ok) {
        lastErr = `${name}: HTTP ${r.status}`;
        continue;
      }
      let data;
      try { data = await r.json(); } catch { continue; }

      // v2 API: { results: { included: [...], almostIncluded: [...] } }
      // The "almost" key is camelCase (almostIncluded) in the current API —
      // older snake_case (almost_included) is kept as a fallback.
      const root = data?.results || data || {};
      const have   = (root.included || []).map(shapeCSPBVariant);
      const almostRaw = root.almostIncluded || root.almost_included || [];
      const almost = almostRaw.map(v => {
        const shaped = shapeCSPBVariant(v);
        // Cards in the combo that AREN'T in the user's pool yet — these are
        // the acquire suggestions.
        const poolLower = new Set((cardPool || []).map(n => n.toLowerCase()));
        const cmdrLower = commanderName.toLowerCase();
        shaped.missing = shaped.cards.filter(c =>
          c.toLowerCase() !== cmdrLower && !poolLower.has(c.toLowerCase())
        );
        return shaped;
      });
      return { status: "ok", have, almost, via: name, total: have.length + almost.length };
    }
    return { status: "network", have: [], almost: [], error: lastErr };
  }

  // ── AI providers ────────────────────────────────────────────────────────────
  // Each call returns { text, finishReason, completionTokens, promptTokens } so
  // callers can detect early/length-truncated responses and diagnose stalls.
  async function callGroq(apiKey, model, userText, systemText, maxTokens = 4096) {
    const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
      body: JSON.stringify({
        model, temperature: 0.7, max_tokens: maxTokens,
        // Force structured JSON output — eliminates prose wrappers like
        // "Here's the JSON:" that defeated safeParse.
        response_format: { type: "json_object" },
        messages: [{ role:"system", content:systemText }, { role:"user", content:userText }],
      }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error?.message || `Groq error ${r.status}`);
    const choice = d.choices?.[0] || {};
    return {
      text: choice.message?.content ?? "",
      finishReason: choice.finish_reason || "unknown",       // length | stop | content_filter | tool_calls
      completionTokens: d.usage?.completion_tokens || null,
      promptTokens:     d.usage?.prompt_tokens     || null,
    };
  }

  // Host-paid Gemini proxy. Sent via the same-origin Worker (/api/ai/gemini),
  // which signs the request with the host's GEMINI_API_KEY and enforces a
  // per-user daily cap (HTTP 429 when exceeded). Used when the visitor hasn't
  // provided their own Gemini key but is signed-in via Cloudflare Access.
  // Returns the same { text, finishReason, completionTokens, … } shape as
  // callGemini, plus { quotaUsed, quotaCap, quotaRemaining }.
  async function callSharedGemini(_unusedApiKey, model, userText, systemText, maxTokens = 4096) {
    const r = await fetch("/api/ai/gemini", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: systemText, user: userText,
        max_tokens: maxTokens, model,
      }),
    });
    let d = null;
    try { d = await r.json(); } catch {}
    if (r.status === 429) {
      const used = d?.used ?? "?", cap = d?.cap ?? "?";
      throw new Error(`Daily shared-key cap reached (${used}/${cap}). Add your own Gemini key in Settings to remove the cap, or wait for tomorrow's reset.`);
    }
    if (!r.ok) {
      throw new Error(d?.error || `Shared Gemini error ${r.status}`);
    }
    return {
      text: d.text || "",
      finishReason: d.finishReason || "unknown",
      completionTokens: d.completionTokens,
      promptTokens:     d.promptTokens,
      thoughtsTokens:   d.thoughtsTokens,
      quotaUsed:        d.quotaUsed,
      quotaCap:         d.quotaCap,
      quotaRemaining:   d.quotaRemaining,
    };
  }

  async function callGemini(apiKey, model, userText, systemText, maxTokens = 4096) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    // Gemini 2.5 ("thinking") models charge internal reasoning tokens against
    // maxOutputTokens. For deterministic structured output (deck JSON) we
    // explicitly disable thinking so the entire budget is available for the
    // visible response. Older models (2.0, 1.5) ignore this field.
    const isThinking = /^gemini-2\.5/.test(model || "");
    const r = await fetch(url, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: systemText }] },
        contents: [{ role:"user", parts: [{ text: userText }] }],
        generationConfig: {
          maxOutputTokens: maxTokens, temperature: 0.7,
          responseMimeType: "application/json",
          ...(isThinking ? { thinkingConfig: { thinkingBudget: 0 } } : {}),
        },
      }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error?.message || `Gemini error ${r.status}`);
    const cand = d.candidates?.[0] || {};
    return {
      text: cand.content?.parts?.[0]?.text ?? "",
      // Gemini uses MAX_TOKENS / STOP / SAFETY / RECITATION in finishReason.
      // Normalize to lowercase for consistent caller logic.
      finishReason: (cand.finishReason || "unknown").toLowerCase(),
      completionTokens: d.usageMetadata?.candidatesTokenCount || null,
      promptTokens:     d.usageMetadata?.promptTokenCount     || null,
      thoughtsTokens:   d.usageMetadata?.thoughtsTokenCount   || null,  // 2.5+
    };
  }

  // ── Archidekt API ───────────────────────────────────────────────────────────
  // Reverse-engineered REST endpoints (https://archidekt.com/api). All calls
  // are likely CORS-blocked from a browser origin like localhost; callers must
  // be prepared to handle network/CORS failures by falling back to clipboard.
  async function archLogin(username, password) {
    // Real endpoint is /api/rest-auth/login/ (dj-rest-auth), NOT /api/users/login/
    // as the docs claimed. Verified against archidekt.com 2026-05.
    const r = await fetch(`${ARCH_API}/rest-auth/login/`, {
      method:      "POST",
      credentials: "include",  // capture session cookies if Archidekt sets any
      headers:     { "Content-Type": "application/json" },
      body:        JSON.stringify({ username, password }),
    });
    let body = null;
    try { body = await r.json(); } catch {}
    if (!r.ok) {
      const msg = body?.non_field_errors?.[0] || body?.detail || body?.error
        || `Login failed (HTTP ${r.status})`;
      const err = new Error(msg); err.status = r.status; throw err;
    }
    // dj-rest-auth response shapes:
    //   • Token mode:  { "key": "<40-char hex>" }
    //   • JWT  mode:   { "access_token": "<jwt>", "refresh_token": "<jwt>", ... }
    //   • Older simplejwt direct: { "access": "<jwt>", "refresh": "<jwt>" }
    // Archidekt uses JWT mode (verified by token shape eyJ…), so prefer those.
    const token = body?.access_token || body?.access
                || body?.key || body?.token || body?.auth_token;
    if (!token) {
      const keys = body && typeof body === "object" ? Object.keys(body).slice(0, 8).join(", ") : "(empty)";
      throw new Error(`Login succeeded but no token in response. Response keys: [${keys}].`);
    }
    return token;
  }

  // Real endpoint is /api/decks/v2/, NOT /api/decks/ as the docs claimed.
  // Payload shape verified against an Archidekt UI request capture (2026-05):
  //   { name, deckFormat, edhBracket, description, private, unlisted,
  //     theorycrafted, featured, playmat, game, cardPackage,
  //     extras: { decksToInclude, commandersToAdd, forceCardsToSingleton,
  //               ignoreCardsOutOfCommanderIdentity } }
  // Cards and categories are NOT included here — they're set via
  // /api/cards/massDeckEdit/ after the deck exists.
  async function archCreateDeck(token, { name, description = "", deckFormat = 3, isPrivate = true, edhBracket = null }) {
    const r = await fetch(`${ARCH_API}/decks/v2/`, {
      method:      "POST",
      credentials: "include",
      headers:     { "Content-Type": "application/json", "Authorization": `JWT ${token}` },
      body: JSON.stringify({
        name,
        deckFormat,
        edhBracket,
        description,
        private: isPrivate,
        unlisted: true,           // newly-created decks default to unlisted
        theorycrafted: false,
        featured: "",
        playmat: "",
        game: null,
        cardPackage: null,
        extras: {
          decksToInclude: [],
          commandersToAdd: [],    // we add the commander via massDeckEdit instead
          forceCardsToSingleton: false,
          ignoreCardsOutOfCommanderIdentity: true,
        },
      }),
    });
    let body = null;
    try { body = await r.json(); } catch {}
    if (!r.ok) {
      const err = new Error(body?.detail || `Create deck failed (HTTP ${r.status})`);
      err.status = r.status; throw err;
    }
    if (!body?.id) throw new Error("Deck created but no id in response.");
    return body.id;
  }

  // Step 1 of save flow: POST /api/cards/massDeckEdit/ — pure parser endpoint.
  // Takes a plain-text deck list, returns parsed structure including `toAdd`
  // with Archidekt's INTERNAL numeric card IDs (which the modifyCards/v2/
  // endpoint requires; Scryfall UUIDs alone won't work). Schema discovered
  // by reading chunk 4081 of their UI bundle.
  //   Request:  { parser: "archidekt", current: <text>, edit: <text> }
  //   Response: { toAdd:[…], toRemove:[…], categories:{…},
  //               syntaxErrors:[…], cardErrors:[…] }
  async function archParseDeckText(token, deckListText) {
    const r = await fetch(`${ARCH_API}/cards/massDeckEdit/`, {
      method:      "POST",
      credentials: "include",
      headers:     { "Content-Type": "application/json", "Authorization": `JWT ${token}` },
      body:        JSON.stringify({ parser: "archidekt", current: "", edit: deckListText }),
    });
    let body = null; try { body = await r.json(); } catch {}
    if (!r.ok) {
      const detail = body?.detail
        || (body && typeof body === "object" ? JSON.stringify(body).slice(0, 240) : null)
        || `HTTP ${r.status}`;
      const err = new Error(`massDeckEdit failed: ${detail}`);
      err.status = r.status; err.body = body; throw err;
    }
    return body;
  }

  // Step 2 of save flow: PATCH /api/decks/{id}/modifyCards/v2/ — the actual
  // persist call. Schema captured from a real Archidekt UI request:
  //   { cards: [{ action, cardid, customCardId, categories, patchId,
  //               modifications: { quantity, modifier, customCmc,
  //                                companion, flippedDefault, label } }] }
  // `cardid` is Archidekt's INTERNAL numeric card ID (as a string) —
  // not Scryfall UUID. `patchId` is a unique random string per entry.
  function randomPatchId() {
    // Match Archidekt's UI: ~8-12 chars from [A-Za-z0-9_-].
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_-";
    let out = "";
    for (let i = 0; i < 11; i++) out += chars[Math.floor(Math.random() * chars.length)];
    return out;
  }

  async function archModifyCards(token, deckId, cardsToAdd) {
    const url = `${ARCH_API}/decks/${deckId}/modifyCards/v2/`;
    const cards = cardsToAdd.map(c => ({
      action: "add",
      cardid: String(c.cardid != null ? c.cardid : (c.card?.id ?? c.id)),
      customCardId: c.customCardId || null,
      categories: Array.isArray(c.categories) ? c.categories : [c.categories].filter(Boolean),
      patchId: randomPatchId(),
      modifications: {
        quantity:        c.quantity        ?? 1,
        modifier:        c.modifier        ?? "Normal",
        customCmc:       c.customCmc       ?? null,
        companion:       c.companion       ?? false,
        flippedDefault:  c.flippedDefault  ?? false,
        label:           c.label           ?? ",#656565",
      },
    }));
    const r = await fetch(url, {
      method:      "PATCH",
      credentials: "include",
      headers:     { "Content-Type": "application/json", "Authorization": `JWT ${token}` },
      body:        JSON.stringify({ cards }),
    });
    let body = null; try { body = await r.json(); } catch {}
    if (!r.ok) {
      const detail = body?.detail
        || (body && typeof body === "object" ? JSON.stringify(body).slice(0, 240) : null)
        || `HTTP ${r.status}`;
      const err = new Error(`modifyCards failed: ${detail}`);
      err.status = r.status; err.body = body; throw err;
    }
    return body;
  }

  // Fetch a deck back from Archidekt after push so we can surface their
  // computed insights (salt total, estimated bracket, price totals, format
  // errors). Their API field names aren't documented — we pull the full
  // object and let the caller pick. Returns the JSON body on success, null
  // on any failure (insights are nice-to-have, not critical).
  async function archGetDeck(token, deckId) {
    try {
      const r = await fetch(`${ARCH_API}/decks/${encodeURIComponent(deckId)}/`, {
        method: "GET",
        credentials: "include",
        headers: { "Accept": "application/json", "Authorization": `JWT ${token}` },
      });
      if (!r.ok) return null;
      return await r.json();
    } catch { return null; }
  }

  // Normalise Archidekt's deck object → a small insights record we render
  // in the deck view. Defensive about field names because Archidekt's API
  // is reverse-engineered and the schema can drift; missing fields just
  // become null and the UI hides them.
  function extractArchInsights(deck) {
    if (!deck || typeof deck !== "object") return null;
    // Salt total — Archidekt aggregates EDHRec salt scores per card.
    // Common field paths: `salt`, `saltTotal`, `stats.salt`, ...
    const salt = deck.salt
              ?? deck.saltTotal
              ?? deck.deckSalt
              ?? deck.stats?.salt
              ?? null;
    // Estimated bracket — could be a number 1-5 or a string ("Bracket 3").
    const bracket = deck.bracket
                 ?? deck.estBracket
                 ?? deck.estimatedBracket
                 ?? deck.deckBracket
                 ?? deck.bracketEstimate
                 ?? null;
    // Price totals — Archidekt computes per-vendor. We expose whatever
    // they hand us; UI shows the first one available.
    const prices = {
      tcg:       deck.totalPrice ?? deck.prices?.tcg       ?? deck.priceTotals?.tcg       ?? null,
      ck:        deck.cardKingdomPrice ?? deck.prices?.ck  ?? deck.priceTotals?.ck        ?? null,
      cardmarket:deck.cardmarketPrice ?? deck.prices?.cardmarket ?? deck.priceTotals?.eu  ?? null,
    };
    // Errors / format warnings.
    const errors = deck.errors
                ?? deck.formatErrors
                ?? deck.warnings
                ?? deck.deckErrors
                ?? deck.legalityErrors
                ?? [];
    // Computed-from-cards salt as a fallback: many Archidekt deck responses
    // include per-card salt in cards[].card.saltScore.
    let cardSaltSum = null;
    if (salt == null && Array.isArray(deck.cards)) {
      let s = 0, found = false;
      for (const entry of deck.cards) {
        const sc = entry?.card?.saltScore ?? entry?.card?.salt;
        if (typeof sc === "number") { s += sc * (entry.quantity || 1); found = true; }
      }
      if (found) cardSaltSum = Math.round(s * 100) / 100;
    }
    // Same trick for prices if not exposed at deck level.
    let cardTcgSum = null;
    if (prices.tcg == null && Array.isArray(deck.cards)) {
      let s = 0, found = false;
      for (const entry of deck.cards) {
        const p = parseFloat(entry?.card?.prices?.tcg ?? entry?.card?.prices?.usd ?? entry?.card?.tcgPrice);
        if (!isNaN(p)) { s += p * (entry.quantity || 1); found = true; }
      }
      if (found) cardTcgSum = Math.round(s * 100) / 100;
    }
    return {
      salt:    typeof salt === "number" ? Math.round(salt * 100) / 100 : (cardSaltSum != null ? cardSaltSum : null),
      bracket,
      prices: {
        tcg:        prices.tcg        ?? cardTcgSum,
        ck:         prices.ck,
        cardmarket: prices.cardmarket,
      },
      errors: Array.isArray(errors) ? errors.filter(Boolean) : (errors ? [errors] : []),
      // The full raw deck — useful for debugging if a field path is missing.
      raw: deck,
    };
  }

  // Resolve a card name → Scryfall UUID via Scryfall (when our local enrichment
  // didn't capture an `id`, e.g. for basic lands or cards not in the collection).
  async function archResolveCardId(name) {
    try {
      const r = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}`);
      if (!r.ok) return null;
      const d = await r.json();
      return d.id || null;
    } catch { return null; }
  }

  // ── CSV parser ──────────────────────────────────────────────────────────────
  // Field-aware tokenizer that handles \r\n, multiline quoted fields, and
  // CSV-escaped double-quotes (`""` inside a quoted value).
  function parseCSV(text) {
    const rows = [];
    let row = [], cur = "", q = false;
    // Strip BOM if present, normalise line endings.
    const t = text.replace(/^﻿/, "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
    for (let i = 0; i < t.length; i++) {
      const ch = t[i];
      if (q) {
        if (ch === '"') {
          if (t[i + 1] === '"') { cur += '"'; i++; }     // escaped quote
          else q = false;
        } else cur += ch;
      } else {
        if (ch === '"') q = true;
        else if (ch === ",") { row.push(cur); cur = ""; }
        else if (ch === "\n") { row.push(cur); rows.push(row); row = []; cur = ""; }
        else cur += ch;
      }
    }
    if (cur.length || row.length) { row.push(cur); rows.push(row); }
    return rows.filter(r => r.length > 1 || (r[0] && r[0].trim()));
  }

  // Detect which collection-tracker emitted a given CSV by inspecting headers.
  // Returns one of "manabox" | "moxfield" | "unknown".
  // Heuristics:
  //   Manabox  → has `binder type` or `binder name` columns
  //   Moxfield → has `tradelist count` (specifically Haves export) OR
  //              the combination of `name`+`edition`+`collector number`
  //              with NO binder columns
  function detectCSVFormat(text) {
    const rows = parseCSV(text);
    if (rows.length < 1) return "unknown";
    const hdr = rows[0].map(h => h.toLowerCase().trim());
    const has = name => hdr.includes(name);
    if (has("binder type") || has("binder name") || has("binder_type")) return "manabox";
    if (has("tradelist count")) return "moxfield";
    // Moxfield's deck export uses Name + CMC + Type + … without "tradelist count".
    if (has("name") && has("edition") && has("collector number") && !has("binder type")) return "moxfield";
    return "unknown";
  }

  // Moxfield "Haves" CSV — a flat collection list with no binder/deck structure.
  // Columns: Count, Tradelist Count, Name, Edition, Condition, Language, Foil,
  // Tags, Last Modified, Collector Number, Alter, Proxy, Purchase Price.
  // We collapse everything into a single virtual binder so the existing
  // selection/enrichment flow works without changes.
  function parseMoxfield(text) {
    const rows = parseCSV(text);
    const stats = { totalRows: 0, included: 0, skippedNoName: 0 };
    if (rows.length < 2) return { decks: [], binders: [], stats };
    const hdr = rows[0].map(h => h.toLowerCase().trim());
    const iName = hdr.findIndex(h => h === "name");
    const iQty  = hdr.findIndex(h => h === "count");
    if (iName < 0) return { decks: [], binders: [], stats };

    const cards = new Map();
    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i];
      stats.totalRows++;
      const name = (cols[iName] || "").trim();
      if (!name) { stats.skippedNoName++; continue; }
      const qty = parseInt((cols[iQty] || "").trim()) || 1;
      if (cards.has(name)) cards.get(name).qty += qty;
      else cards.set(name, { name, qty, id: "" });   // Moxfield CSV doesn't expose Scryfall IDs
      stats.included++;
    }
    const binder = {
      name: "Moxfield Collection",
      type: "binder",
      cards: [...cards.values()],
      commanderName: null,
    };
    return { decks: [], binders: [binder], stats };
  }

  // ── Manabox share URL import ────────────────────────────────────────────────
  //
  // Public Manabox decks (https://manabox.app/decks/<shareId>) embed their full
  // contents as JSON inside an Astro hydration island — specifically the one
  // with component-export="Main". The data is serialised in Astro's reactive
  // [type, value] format where 0 = literal, 1 = array — so to read it we need
  // to recursively unwrap that wrapping.

  function manaboxDeckIdFromURL(s) {
    if (!s) return null;
    const t = s.trim();
    // Allow both full URLs and bare share-ids.
    const m = t.match(/manabox\.app\/decks\/([A-Za-z0-9_-]+)/);
    if (m) return m[1];
    if (/^[A-Za-z0-9_-]{8,}$/.test(t)) return t;   // assume bare share id
    return null;
  }

  // Astro's hydration format wraps every value in `[type, X]`. Type 0 = literal
  // (single value), type 1 = array (X is the inner array). Recurse to peel it.
  function astroUnwrap(v) {
    if (Array.isArray(v) && v.length === 2 && typeof v[0] === "number") {
      return astroUnwrap(v[1]);
    }
    if (Array.isArray(v)) return v.map(astroUnwrap);
    if (v && typeof v === "object") {
      const out = {};
      for (const [k, val] of Object.entries(v)) out[k] = astroUnwrap(val);
      return out;
    }
    return v;
  }

  // Minimal HTML-entity decoder (matches what the browser's textarea decoder
  // would do for the entities Astro actually emits in attribute values).
  function decodeHtmlEntities(s) {
    if (typeof DOMParser !== "undefined") {
      // Cheapest correct way: let the parser handle it.
      const doc = new DOMParser().parseFromString(`<x v="${s}">`, "text/html");
      return doc.querySelector("x").getAttribute("v") || "";
    }
    return s
      .replace(/&quot;/g, "\"").replace(/&amp;/g,  "&")
      .replace(/&lt;/g,   "<").replace(/&gt;/g,    ">")
      .replace(/&#39;/g,  "'").replace(/&apos;/g,  "'");
  }

  // boardCategory in Manabox's data:
  //   0 = commander
  //   3 = mainboard
  // (Other values exist for sideboard / maybeboard / etc; we surface them as
  // mainboard if encountered so nothing is lost.)
  function parseManaboxShareHTML(html) {
    if (!html || typeof html !== "string") {
      return { error: "Empty response from Manabox." };
    }
    // Locate the Main hydration island. There may be multiple <astro-island>
    // elements on the page — we want the one that exports `Main`.
    const m = html.match(/<astro-island[^>]*component-export="Main"[^>]*\sprops="([^"]+)"/);
    if (!m) {
      return { error: "Couldn't find deck data in the Manabox page. The URL may be private or the page format may have changed." };
    }
    let raw;
    try {
      raw = JSON.parse(decodeHtmlEntities(m[1]));
    } catch (e) {
      return { error: "Couldn't decode Manabox deck JSON: " + (e.message || e) };
    }
    const data = astroUnwrap(raw);
    const deck = data?.deck;
    if (!deck || !Array.isArray(deck.cards)) {
      return { error: "Manabox page didn't include card data." };
    }

    // Find the commander (boardCategory 0). If there's more than one, the
    // first wins — the rest fall back into the mainboard.
    let commanderName = null;
    const cards = new Map();   // name → { name, qty, id }
    let unknownCats = 0;
    for (const c of deck.cards) {
      const name = c.name;
      if (!name) continue;
      const qty  = c.quantity || 1;
      if (c.boardCategory === 0 && !commanderName) {
        commanderName = name;
      } else if (c.boardCategory !== 0 && c.boardCategory !== 3) {
        unknownCats++;
      }
      // Merge by name across all boards — quantity stacks the way it would
      // for a Manabox CSV import.
      if (cards.has(name)) cards.get(name).qty += qty;
      else cards.set(name, { name, qty, id: "" });
    }

    return {
      deck: {
        name:           deck.name || "Manabox deck",
        type:           "deck",
        commanderName,
        cards:          [...cards.values()],
        source:         "manabox-share",
        importedAt:     Date.now(),
        manaboxId:      deck.id || null,
        format:         deck.format || null,
      },
      stats: {
        totalCards:   [...cards.values()].reduce((s, c) => s + c.qty, 0),
        uniqueCards:  cards.size,
        unknownCats,
      },
    };
  }

  async function fetchManaboxShare(input) {
    const id = manaboxDeckIdFromURL(input);
    if (!id) return { error: "Couldn't read a deck id out of that input. Expected a https://manabox.app/decks/… URL." };

    let r;
    try {
      r = await fetch(`/manabox-share/decks/${encodeURIComponent(id)}`);
    } catch (e) {
      return { error: `Couldn't reach Manabox: ${(e?.message || e).toString().slice(0, 120)}` };
    }
    if (!r.ok) {
      return { error: `Manabox returned HTTP ${r.status} — the deck may be private or removed.` };
    }
    const html = await r.text();
    return parseManaboxShareHTML(html);
  }

  // Dispatcher that picks the right parser based on header detection.
  function parseCollectionCSV(text) {
    const format = detectCSVFormat(text);
    if (format === "moxfield") return { format, ...parseMoxfield(text) };
    if (format === "manabox")  return { format, ...parseManabox(text) };
    return { format: "unknown", decks: [], binders: [], stats: { totalRows: 0, included: 0, skippedNoName: 0 } };
  }

  function parseManabox(text) {
    const rows = parseCSV(text);
    const stats = { totalRows: 0, included: 0, skippedNoName: 0 };
    if (rows.length < 2) return { decks: [], binders: [], stats };
    const hdr = rows[0].map(h => h.toLowerCase().trim());
    const iName = hdr.findIndex(h => h === "name");
    const iQty  = hdr.findIndex(h => h.includes("quantity"));
    const iBT   = hdr.findIndex(h => h === "binder type" || h === "binder_type");
    const iBN   = hdr.findIndex(h => h === "binder name" || h === "binder_name");
    const iSF   = hdr.findIndex(h => h.includes("scryfall"));
    const iCmd  = hdr.findIndex(h => h.includes("commander"));        // is_commander flag
    if (iName < 0) return { decks: [], binders: [], stats };

    const groups = new Map();
    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i];
      stats.totalRows++;
      const name = (cols[iName] || "").trim();
      if (!name) { stats.skippedNoName++; continue; }
      const qty  = parseInt((cols[iQty] || "").trim()) || 1;
      const btRaw = (cols[iBT] || "binder").toLowerCase().trim();
      const bt   = btRaw === "binder" ? "binder" : "deck";
      const bn   = iBN >= 0 ? ((cols[iBN] || "").trim() || "Default Binder") : "Default Binder";
      const sfid = iSF >= 0 ? (cols[iSF] || "").trim() : "";
      const isCmdr = iCmd >= 0 && /^(true|1|yes)$/i.test((cols[iCmd] || "").trim());
      const key = `${bt}::${bn}`;
      if (!groups.has(key)) groups.set(key, { type: bt, name: bn, cards: new Map() });
      const g = groups.get(key);
      if (isCmdr) g.commanderName = name;
      if (g.cards.has(name)) g.cards.get(name).qty += qty;
      else g.cards.set(name, { name, qty, id: sfid });
      stats.included++;
    }
    const decks = [], binders = [];
    for (const [, g] of groups) {
      const item = { name: g.name, type: g.type, cards: [...g.cards.values()], commanderName: g.commanderName || null };
      if (g.type === "deck") decks.push(item); else binders.push(item);
    }
    return { decks, binders, stats };
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  // Robust JSON extractor: handles markdown fences, BOM, stray prose before/after
  // the JSON object, and trailing commas. Returns null if no JSON object can be
  // recovered. Stores the raw response on safeParse.lastRaw for diagnostics.
  function safeParse(raw) {
    safeParse.lastRaw = raw;
    if (typeof raw !== "string" || !raw.trim()) return null;
    // Strip BOM, code fences, and surrounding whitespace.
    let s = raw.replace(/^﻿/, "").replace(/```(?:json)?/gi, "").trim();
    // Direct parse first (when responseMimeType / response_format is honored).
    try { return JSON.parse(s); } catch {}
    // Fallback: extract the substring from the first `{` to the matching last `}`.
    const first = s.indexOf("{");
    const last  = s.lastIndexOf("}");
    if (first >= 0 && last > first) {
      const block = s.slice(first, last + 1);
      try { return JSON.parse(block); } catch {}
      // Last resort: strip trailing commas inside objects/arrays (not RFC 8259
      // compliant, but some models still emit them).
      const cleaned = block.replace(/,(\s*[}\]])/g, "$1");
      try { return JSON.parse(cleaned); } catch {}
    }
    return null;
  }
  function fingerprint(cards) {
    return cards.map(c => c.name).sort().slice(0, 80).join("|");
  }
  // Shared filter — rejects everything that can't legally appear in an EDH deck.
  // Catches tokens, emblems, art cards, silver-bordered Un-cards (Unfinity), and
  // anything Scryfall flags as `legalities.commander !== "legal"` (when known).
  // Conservative for older cached data lacking the new fields.
  function isEDHLegalCard(sf) {
    if (!sf) return false;
    const bad = ["token", "double_faced_token", "emblem", "art_series",
                 "scheme", "vanguard", "planar"];
    if (bad.includes(sf.layout)) return false;
    if (sf.border_color === "silver") return false;          // Un-sets
    if (sf.set_type === "funny")     return false;           // Unfinity etc.
    // Set-code blocklist — catches Un-set cards even when border_color/set_type
    // aren't yet cached (older slim entries).
    if (sf.set && UN_SET_CODES.has(String(sf.set).toLowerCase())) return false;
    // Explicit commander_legal flag — reject when present and false.
    if (sf.commander_legal === false) return false;
    // Type-line safety net for old cache entries missing the new fields.
    const faces = sf.card_faces || [];
    const tl = [sf.type_line, ...faces.map(f => f.type_line)].filter(Boolean).join(" // ").toLowerCase();
    if (/\btoken\b/.test(tl))  return false;
    if (/\bemblem\b/.test(tl)) return false;
    return true;
  }

  function isCommander(sf) {
    if (!isEDHLegalCard(sf)) return false;
    const faces = sf.card_faces || [];
    const tl = [sf.type_line, ...faces.map(f => f.type_line)].filter(Boolean).join(" // ").toLowerCase();
    const ol = [sf.oracle_text, ...faces.map(f => f.oracle_text)].filter(Boolean).join(" ").toLowerCase();
    return (tl.includes("legendary") && (tl.includes("creature") || tl.includes("planeswalker")))
      || ol.includes("can be your commander");
  }
  function computeUsable(groups, deckInc, binInc) {
    const seen = new Map();
    const add = cards => cards.forEach(c => {
      if (seen.has(c.name)) seen.get(c.name).qty += c.qty;
      else seen.set(c.name, { ...c });
    });
    (groups.decks || []).forEach(d => { if (deckInc[d.name]) add(d.cards); });
    (groups.binders || []).forEach(b => { if (binInc[b.name]) add(b.cards); });
    return [...seen.values()];
  }

  // ── App ─────────────────────────────────────────────────────────────────────
  function App() {
    const [phase,    setPhase]    = useState("init");
    const [prevPhase,setPrev]     = useState("ready");
    // Dual-provider configuration: each provider has its own key & preferred model.
    // `provider` is just the PRIMARY — the other is auto-tried as fallback when set.

    const [usable,   setUsable]   = useState([]);
