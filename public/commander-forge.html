    const [library,    setLibrary]  = useState([]);   // saved deck entries
    const [libSaved,   setLibSaved] = useState(false);// just saved to library
    const [fromSaved,  setFromSaved]= useState(false);// viewing a saved deck
    const [fromCollection, setFromCollection] = useState(false); // viewing a deck opened from the Collection
    // Snapshot of the user's in-progress (unsaved) built deck — preserved when
    // the user opens a saved deck from Library so we can restore on demand.
    const [unsavedDeck, setUnsavedDeck] = useState(null); // { deck, selCmd } | null

    const [csvInput, setCsv]      = useState("");
    const [csvDragOver, setCsvDragOver] = useState(false);
    const [manaboxUrl, setManaboxUrl] = useState("");
    const [manaboxBusy, setManaboxBusy] = useState(false);
    const csvFileRef = useRef(null);
    const readCsvFile = (file) => {
      if (!file) return;
      // Permissive on type — Manabox exports vary (text/csv, application/vnd.ms-excel,
      // sometimes blank on macOS). Trust the .csv extension or any text/* type.
      const looksCsv = /\.csv$/i.test(file.name) || /^text\//.test(file.type) || file.type === "application/vnd.ms-excel" || file.type === "";
      if (!looksCsv) {
        setError(`That looks like a ${file.type || "non-CSV"} file. Drop a .csv file or paste the contents instead.`);
        return;
      }
      const reader = new FileReader();
      reader.onload  = e => { setCsv(String(e.target.result || "")); setError(""); };
      reader.onerror = () => setError("Couldn't read that file — paste the contents instead.");
      reader.readAsText(file);
    };
    const [activeTab,setTab]      = useState("build");
    const [log,      setLog]      = useState([]);
    const [progress, setProg]     = useState(0);
    const [error,    setError]    = useState("");
    const [colorFilter, setCF]    = useState([]);
    const [colorMode,   setCM]    = useState("at_least");
    const [colorless,   setCL]    = useState(false);
    const [cmdrQuery,   setCmdrQuery] = useState("");   // name search in Commanders tab

    // ── Build preferences ───────────────────────────────────────────────
    const [bracket,    setBracket]    = useState(3);            // 1-5 (WotC Commander Brackets)
    const [archetypes, setArchetypes] = useState([]);           // up to 3
    const [budget,     setBudget]     = useState("");           // USD total, "" = no cap
    const [mech,       setMech]       = useState({              // construction targets
      lands: 37, ramp: 10, draw: 10, removal: 8, wipes: 3,
      interaction: "medium",   // low | medium | high
      recursion:   "light",    // none | light | heavy
    });
    const [showMech, setShowMech]     = useState(false);

    const [expandedDeckCard, setExpandedCard] = useState(null);
    const [cardTooltip,  setCardTooltip]  = useState(null); // { img, name, x, y }

    // ── Archidekt integration ───────────────────────────────────────────
    const [archUser,    setArchUser]    = useState("");
    const [archPass,    setArchPass]    = useState("");
    const [archToken,   setArchToken]   = useState("");
    const [archStatus,  setArchStatus]  = useState("idle"); // idle | testing | ok | fail
    const [archStatusMsg, setArchStatusMsg] = useState("");
    const [archPushing, setArchPushing] = useState(false);  // false | { phase, done, total }
    const [archResult,  setArchResult]  = useState(null);   // { kind: "ok"|"fallback", url, msg }
    const archCredsSaved = !!(archUser && archPass);

    const [scrolled,     setScrolled]     = useState(false);
    const [wideEnough,   setWideEnough]   = useState(() => window.innerWidth >= 860);
    const [headerH,      setHeaderH]      = useState(0);
    const [sfCacheVer,   setSFCacheVer]   = useState(0); // bumped to refresh cache display

    // ── Cloud-sync state ───────────────────────────────────────────────────
    // status flow:
    //   "init"     → component mounted, haven't checked auth yet
    //   "checking" → fetching /api/me
    //   "unauth"   → Access not configured or user not logged in (LS-only mode)
    //   "pulling"  → fetching /api/state on first load
    //   "ready"    → pull complete, local state hydrated, periodic push armed
    //   "active"   → at least one push succeeded (lastSync is fresh)
    //   "error"    → something went wrong, show details
    // The existing init useEffect (reads localStorage → React state) is gated
    // on this so cloud data lands in localStorage BEFORE the React state is
    // hydrated. Without the gate, the first render would use stale local data.
    const [cloudSync, setCloudSync] = useState({
      status: "init", email: null, lastSync: 0, error: null, pending: false,
    });
    // Internals that don't need re-render: last pushed hash, last server lastModified, timer id.
    const syncRef = useRef({ lastPushedHash: "", lastModified: 0 });
    // One-shot guard for the localStorage→React init effect. Without it the
    // effect re-fires on every cloudSync.status change (e.g. "ready"→"active"
    // after the first push) and resets `phase` back to "ready", yanking the
    // user out of whatever screen they're on.
    const didInitRef = useRef(false);

    // ── Shared-Gemini-key state ──────────────────────────────────────────
    // The host can expose a pre-paid Gemini key with a per-user daily cap so
    // friends without their own key can still build decks. The Worker tells
    // us via /api/quota whether a host key exists; the user toggles whether
    // they actually want to USE it (default ON if they don't have their own).
    const [useSharedGemini, setUseSharedGemini] = useState(() => {
      const saved = localStorage.getItem(LS_USE_SHARED);
      // Default ON for first-time users — if the host hasn't exposed a shared
      // key, the toggle is hidden anyway, so this is safely-noop in that case.
      return saved === null ? true : saved === "1";
    });
    const [sharedQuota, setSharedQuota] = useState({
      hasHostKey: false, used: 0, cap: 20, remaining: 20, loaded: false,
    });
    // Persist preference whenever it changes (also picked up by sync).
    useEffect(() => {
      localStorage.setItem(LS_USE_SHARED, useSharedGemini ? "1" : "0");
    }, [useSharedGemini]);
    const tooltipTimer = useRef(null);
    const headerRef    = useRef(null);

    const showTooltip = (e, normalImg, name) => {
      if (!normalImg) return;
      clearTimeout(tooltipTimer.current);
      const rect = e.currentTarget.getBoundingClientRect();
      tooltipTimer.current = setTimeout(() => {
        const popW = 290;
        // When the sticky left panel is visible, cards are already padded right of it —
        // tooltips always have room to the right; fall back left only at the true right edge.
        const x = (rect.right + 14 + popW <= window.innerWidth - 20)
          ? rect.right + 14
          : Math.max(8, rect.left - popW - 14);
        const y = Math.max(8, Math.min(rect.top, window.innerHeight - 430));
        setCardTooltip({ img: normalImg, name, x, y });
      }, 420);
    };
    const hideTooltip = () => { clearTimeout(tooltipTimer.current); setCardTooltip(null); };

    // Lines starting with "   …" are progress updates — if the previous log
    // line was also "   …", REPLACE it instead of appending. Keeps the long
    // Scryfall batch fetch as a single animating line, not 20 stacked ones.
    const addLog = msg => setLog(l => {
      if (typeof msg === "string" && msg.startsWith("   …")
          && l.length > 0 && typeof l[l.length-1] === "string"
          && l[l.length-1].startsWith("   …")) {
        return [...l.slice(0, -1), msg];
      }
      return [...l, msg];
    });

    // ── Cloud sync: auth-check + initial pull, runs ONCE on mount ─────────
    // Must complete before the local-init effect below reads localStorage,
    // so the cloud snapshot has a chance to overwrite local data first.
    useEffect(() => {
      let cancelled = false;
      (async () => {
        setCloudSync(s => ({ ...s, status: "checking" }));

        // Step 1 — whoami
        let meResp;
        try {
          const r = await fetch("/api/me");
          meResp = await r.json();
        } catch (e) {
          // /api/me unreachable (local dev with python http.server, old Worker,
          // or a network blip). Fall through to LS-only mode.
          if (!cancelled) setCloudSync({ status: "unauth", email: null, lastSync: 0, error: null, pending: false });
          return;
        }

        if (!meResp?.authenticated) {
          if (!cancelled) setCloudSync({ status: "unauth", email: null, lastSync: 0, error: null, pending: false });
          return;
        }

        // Step 2 — pull state from KV
        if (!cancelled) setCloudSync({ status: "pulling", email: meResp.email, lastSync: 0, error: null, pending: false });

        try {
          const r = await fetch("/api/state");
          if (r.status === 503) {
            // Auth OK but KV not configured server-side. Still useful to show
            // the user as "signed in" but mark sync as disabled.
            if (!cancelled) setCloudSync({ status: "unauth", email: meResp.email, lastSync: 0, error: "Cloud sync isn't set up on this deployment yet.", pending: false });
            return;
          }
          if (!r.ok) {
            if (!cancelled) setCloudSync({ status: "error", email: meResp.email, lastSync: 0, error: `HTTP ${r.status} pulling state`, pending: false });
            return;
          }
          const data = await r.json();
          if (data?.state) {
            const changed = applySyncSnapshot(data.state);
            if (changed > 0) {
              // Existing localStorage has been overwritten — but the local-init
              // effect below hasn't run yet because it's gated on cloudSync.status.
            }
            syncRef.current.lastModified = data.lastModified || 0;
          }
          syncRef.current.lastPushedHash = snapshotHash(readSyncSnapshot());
          if (!cancelled) setCloudSync({ status: "ready", email: meResp.email, lastSync: Date.now(), error: null, pending: false });

          // Fetch quota info — tells us whether a host Gemini key is available
          // and how many shared builds the user has left for the day.
          try {
            const qr = await fetch("/api/quota");
            if (qr.ok) {
              const qd = await qr.json();
              if (!cancelled) setSharedQuota({
                hasHostKey: !!qd.hasHostKey,
                used:       qd.used      ?? 0,
                cap:        qd.cap       ?? 20,
                remaining:  qd.remaining ?? 20,
                loaded:     true,
              });
            }
          } catch {/* non-fatal; quota stays at defaults */}
        } catch (e) {
          if (!cancelled) setCloudSync({ status: "error", email: meResp.email, lastSync: 0, error: e.message || "pull failed", pending: false });
        }
      })();
      return () => { cancelled = true; };
    }, []);

    useEffect(() => {
      // ── Load + migrate AI provider configuration ────────────────────────
      // Gated on cloud sync completion so cloud data is in LS before we read it.
      // The one-shot guard is critical: cloudSync.status transitions multiple
      // times during a normal session (init → checking → pulling → ready →
      // active after first push). Without the guard, every transition would
      // re-run this effect and call setPhase("ready"/"import") — yanking the
      // user back to Home from wherever they navigated. didInit.current
      // ensures we hydrate React state from localStorage exactly once.
      if (cloudSync.status === "init" || cloudSync.status === "checking" || cloudSync.status === "pulling") return;
      if (didInitRef.current) return;
      didInitRef.current = true;

      const groqKey   = localStorage.getItem(LS_KEY_GROQ)   || "";
      const geminiKey = localStorage.getItem(LS_KEY_GEMINI) || "";
      const oldKey    = localStorage.getItem(LS_APIKEY)     || "";
      let prov        = localStorage.getItem(LS_PROVIDER)   || "groq";
      // If old storage saved "cloudflare" as primary (a removed provider), pick
      // whichever real provider has a key — or default to "groq" otherwise.
      if (prov !== "groq" && prov !== "gemini") prov = geminiKey ? "gemini" : "groq";
      const oldModel  = localStorage.getItem(LS_MODEL)      || "";
      let savedModels = {};
      try { savedModels = JSON.parse(localStorage.getItem(LS_MODELS) || "{}"); } catch {}

      const keys = { groq: groqKey, gemini: geminiKey };

      // Migrate single-key storage → dual-key storage.
      if (oldKey && !keys[prov]) {
        keys[prov] = oldKey;
        localStorage.setItem(prov === "groq" ? LS_KEY_GROQ : LS_KEY_GEMINI, oldKey);
      }
      if (oldKey) localStorage.removeItem(LS_APIKEY);

      // Migrate single-model storage → per-provider model storage.
      if (oldModel && !savedModels[prov]) savedModels[prov] = oldModel;
      if (oldModel) localStorage.removeItem(LS_MODEL);

      // Validate every saved model ID against the current catalog. Models get
      // retired (e.g. May-2025 Gemini previews) and an unknown ID throws "model
      // not found" at request time — surface it now and reset to the default.
      const validateModel = (pid, id) => {
        const list = PROVIDERS[pid].models;
        return list.some(m => m.id === id) ? id : list[0].id;
      };
      const mods = {
        groq:   validateModel("groq",   savedModels.groq   || PROVIDERS.groq.models[0].id),
        gemini: validateModel("gemini", savedModels.gemini || PROVIDERS.gemini.models[0].id),
      };
      // Persist if anything was corrected so we don't keep auto-fixing on every load.
      const same = ["groq", "gemini"].every(k => mods[k] === savedModels[k]);
      if (!same) localStorage.setItem(LS_MODELS, JSON.stringify(mods));

      setProvider(prov);
      setApiKeys(keys);
      setAKI(keys);
      setModels(mods);

      // First-run: force the Settings panel until at least one key is saved.
      if (!keys.groq && !keys.gemini) { setPhase("setup"); return; }

      const savedCards   = localStorage.getItem(LS_CARDS);
      const savedBinders = localStorage.getItem(LS_BINDERS);
      const savedCmdrs   = localStorage.getItem(LS_COMMANDERS);
      const savedPrefs   = localStorage.getItem(LS_PREFS);

      if (savedPrefs) {
        try {
          const p = JSON.parse(savedPrefs);
          if (p.bracket)    setBracket(p.bracket);
          if (p.archetypes) setArchetypes(p.archetypes);
          if (p.budget != null) setBudget(p.budget);
          if (p.mech)       setMech(prev => ({ ...prev, ...p.mech }));
        } catch {}
      }

      if (savedBinders) {
        const bg = JSON.parse(savedBinders);
        setGroups(bg.groups); setDeckInc(bg.deckInc); setBinInc(bg.binInc);
      }
      if (savedCards)  setUsable(JSON.parse(savedCards));
      if (savedCmdrs) {
        const c = JSON.parse(savedCmdrs);
        // Re-apply isCommander to the cached list — this scrubs tokens and any
        // other entries that older versions of the filter let through.
        const cleaned = (c.commanders || []).filter(cm => isCommander(cm.scryfall || {}));
        setCmdrs(cleaned);
        if (cleaned.length !== (c.commanders || []).length) {
          // Persist the cleaned list so we don't filter again on next load.
          localStorage.setItem(LS_COMMANDERS, JSON.stringify({ fp: c.fp, commanders: cleaned }));
        }
      }
      const savedLib = localStorage.getItem(LS_LIBRARY);
      if (savedLib) { try { setLibrary(JSON.parse(savedLib)); } catch {} }

      // ── Archidekt credentials + cached token ──
      try {
        const rawCreds = localStorage.getItem(LS_ARCH_CREDS);
        if (rawCreds) {
          const c = JSON.parse(rawCreds);
          if (c?.username) setArchUser(c.username);
          if (c?.password) setArchPass(c.password);
        }
      } catch {}
      const savedTok = localStorage.getItem(LS_ARCH_TOKEN);
      if (savedTok) setArchToken(savedTok);

      if (savedCards) setPhase("ready"); else setPhase("import");
    }, [cloudSync.status]);   // re-runs once cloud-sync finishes (or fails)

    // ── Cloud sync: periodic push (debounced) ──────────────────────────────
    // Polls localStorage every SYNC_PUSH_INTERVAL_MS. When the syncable
    // snapshot's hash differs from what we last pushed, PUT it to /api/state.
    // No-op when sync isn't ready (LS-only mode or auth failure).
    // Also flushes on tab close via fetch keepalive.
    useEffect(() => {
      if (cloudSync.status !== "ready" && cloudSync.status !== "active") return;

      let cancelled = false;

      const pushNow = async (opts = {}) => {
        const snap = readSyncSnapshot();
        const hash = snapshotHash(snap);
        if (hash === syncRef.current.lastPushedHash && !opts.force) return;

        if (!cancelled) setCloudSync(s => ({ ...s, pending: true }));
        try {
          const r = await fetch("/api/state", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              state: snap,
              expectedLastModified: syncRef.current.lastModified,
            }),
            keepalive: !!opts.keepalive,
          });
          if (r.status === 409) {
            // Server has newer data. The cleanest recovery is to reload so the
            // init effect re-pulls. Show an explanatory error in the meantime.
            if (!cancelled) setCloudSync(s => ({
              ...s, pending: false,
              error: "Another device saved newer data — reload to merge.",
            }));
            return;
          }
          if (!r.ok) {
            const errData = await r.json().catch(() => ({}));
            if (!cancelled) setCloudSync(s => ({
              ...s, pending: false,
              error: errData.error || `Push failed (HTTP ${r.status})`,
            }));
            return;
          }
          const data = await r.json();
          syncRef.current.lastModified   = data.lastModified || Date.now();
          syncRef.current.lastPushedHash = hash;
          if (!cancelled) setCloudSync(s => ({
            ...s, status: "active", lastSync: Date.now(),
            pending: false, error: null,
          }));
        } catch (e) {
          if (!cancelled) setCloudSync(s => ({ ...s, pending: false, error: e.message || "push failed" }));
        }
      };

      const intervalId = setInterval(pushNow, SYNC_PUSH_INTERVAL_MS);

      // Best-effort flush on tab close. fetch with keepalive survives unload
      // (where sendBeacon would, but sendBeacon only supports POST not PUT).
      const flushOnExit = () => pushNow({ keepalive: true });
      window.addEventListener("beforeunload", flushOnExit);
      // Also flush when the tab becomes hidden — covers mobile background
      // and tab-switch cases where beforeunload doesn't always fire.
      const onVis = () => { if (document.visibilityState === "hidden") flushOnExit(); };
      document.addEventListener("visibilitychange", onVis);

      return () => {
        cancelled = true;
        clearInterval(intervalId);
        window.removeEventListener("beforeunload", flushOnExit);
        document.removeEventListener("visibilitychange", onVis);
      };
    }, [cloudSync.status]);

    // Persist build preferences whenever they change.
    useEffect(() => {
      localStorage.setItem(LS_PREFS, JSON.stringify({ bracket, archetypes, budget, mech }));
    }, [bracket, archetypes, budget, mech]);

    // Track scroll, viewport width and header height.
    useEffect(() => {
      const onUpdate = () => {
        setScrolled(window.scrollY > 220);
        setWideEnough(window.innerWidth >= 860);
        if (headerRef.current) setHeaderH(headerRef.current.offsetHeight);
      };
      onUpdate();
      window.addEventListener("scroll", onUpdate, { passive: true });
      window.addEventListener("resize", onUpdate, { passive: true });
      return () => {
        window.removeEventListener("scroll", onUpdate);
        window.removeEventListener("resize", onUpdate);
      };
    }, []);

    const saveSettings = () => {
      const groqK = (aki.groq   || "").trim();
      const gemK  = (aki.gemini || "").trim();
      const groqOK = groqK.length >= 20;
      const gemOK  = gemK.length  >= 20;
      // In freeAIMode the user has explicitly opted into the host's shared
      // Gemini key — no own key required to proceed.
      const inFreeAIMode = useSharedGemini && sharedQuota.hasHostKey;
      if (!inFreeAIMode && !groqOK && !gemOK) {
        setError("Add at least one API key, or toggle on \"Use the free AI\" to continue.");
        return;
      }
      // Persist whichever keys are present; clear blanks.
      if (groqOK) localStorage.setItem(LS_KEY_GROQ,   groqK); else localStorage.removeItem(LS_KEY_GROQ);
      if (gemOK)  localStorage.setItem(LS_KEY_GEMINI, gemK);  else localStorage.removeItem(LS_KEY_GEMINI);
      localStorage.setItem(LS_PROVIDER, provider);
      localStorage.setItem(LS_MODELS, JSON.stringify(models));

      // ── Archidekt creds: persist when both fields filled, else clear ──
      const aU = (archUser || "").trim();
      const aP = (archPass || "").trim();
      if (aU && aP) {
        localStorage.setItem(LS_ARCH_CREDS, JSON.stringify({ username: aU, password: aP }));
      } else {
        localStorage.removeItem(LS_ARCH_CREDS);
        localStorage.removeItem(LS_ARCH_TOKEN);
        setArchToken("");
      }

      const newKeys = { groq: groqOK ? groqK : "", gemini: gemOK ? gemK : "" };
      setApiKeys(newKeys);
      // If the chosen primary has no key but the other does, switch primary so AI calls work.
      if (!newKeys[provider]) {
        const other = provider === "groq" ? "gemini" : "groq";
        if (newKeys[other]) setProvider(other);
      }
      setError("");
      const saved = localStorage.getItem(LS_CARDS);
      if (saved) { setUsable(JSON.parse(saved)); setPhase("ready"); }
      else setPhase("import");
    };

    // Two mutually-exclusive modes, picked by the user via the "Use free AI"
    // toggle in Settings:
    //   freeAIMode    → ONLY the host's shared Gemini key is usable; ignore
    //                   anything the user might have pasted in the provider
    //                   panels (they were hidden anyway).
    //   ownKeysMode   → ONLY the user's own keys are tried; shared is OFF.
    // This matches the simplified UX where the panels are visibly hidden
    // when "Use free AI" is on, so it would be confusing if Groq/Gemini own
    // keys still silently fired in the background.
    const freeAIMode       = useSharedGemini && sharedQuota.hasHostKey;
    const sharedGeminiUsable = freeAIMode && sharedQuota.remaining > 0;

    const aiUsableProviders = (exclude = []) => {
      if (freeAIMode) {
        return sharedGeminiUsable && !exclude.includes("gemini") ? ["gemini"] : [];
      }
      const all = ["groq", "gemini"];
      const order = [provider, ...all.filter(p => p !== provider)];
      return order.filter(p => !exclude.includes(p) && !!apiKeys[p]);
    };

    // Per-provider max_tokens caps. Callers ask for an upper bound (e.g. 16384
    // for deck builds), but each provider has its own ceiling on the FREE tier:
    //   - Groq Llama 3.3 70B free tier: 12 000 TPM (tokens per minute, total
    //     for input + reserved output). With ~4-5 K input we cap at 7 000 so
    //     a single request fits comfortably (input + 7 000 ≈ 11-12 K). NOTE:
    //     two attempts within the same minute will still blow TPM, so
    //     buildDeck skips its focused-prompt retry on Groq (see comment there).
    //   - Gemini 2.5 Flash: up to 65 536 output, comfortably handles 16 384.
    const PROVIDER_MAX_TOKENS = { groq: 7000, gemini: 16384 };

    // Run a prompt on a single, specific provider. Throws on API failure.
    // In freeAIMode the only allowed provider is Gemini-via-shared (own keys
    // are ignored). In ownKeysMode the user's own key is used directly.
    const callAIOn = async (p, userText, systemText, maxTokens) => {
      const cap = PROVIDER_MAX_TOKENS[p] || maxTokens;
      const max = Math.min(maxTokens, cap);
      const mdl = models[p] || PROVIDERS[p].models[0].id;

      if (freeAIMode && p === "gemini") {
        const result = await callSharedGemini("", mdl, userText, systemText, max);
        // Mirror server quota into local state so the UI updates immediately.
        if (typeof result.quotaRemaining === "number") {
          setSharedQuota(s => ({
            ...s,
            used:      result.quotaUsed ?? s.used + 1,
            remaining: result.quotaRemaining,
          }));
        }
        return { ...result, provider: p, maxTokens: max, viaShared: true };
      }

      const fn  = p === "groq" ? callGroq : callGemini;
      const key = apiKeys[p] || "";
      const result = await fn(key, mdl, userText, systemText, max);
      return { ...result, provider: p, maxTokens: max };
    };

    // Try the primary provider first; on API-level failure (rate-limit, network,
    // 5xx) fall back to the next configured provider. Does NOT detect bad-content
    // responses — for that, buildDeck has its own provider-rotation loop that
    // rotates on parse failure too (some small models return valid HTTP 200 with
    // unparseable garbage; only the caller knows what "valid output" looks like).
    // Returns { text, finishReason, completionTokens, promptTokens, provider }.
    const callAI = async (userText, systemText, maxTokens = 4096, exclude = []) => {
      const usable = aiUsableProviders(exclude);
      let lastErr = null;
      for (let i = 0; i < usable.length; i++) {
        const p = usable[i];
        try {
          const result = await callAIOn(p, userText, systemText, maxTokens);
          if (i > 0) addLog(`✅ Fallback to ${PROVIDERS[p].label} succeeded.`);
          return result;
        } catch (e) {
          lastErr = e;
          const msg  = (e.message || "").slice(0, 110);
          const next = usable[i + 1];
          if (next) addLog(`⚠️ ${PROVIDERS[p].label} failed (${msg}). Trying ${PROVIDERS[next].label}…`);
          else      addLog(`⚠️ ${PROVIDERS[p].label} failed (${msg}). No fallback available.`);
        }
      }
      throw lastErr || new Error("No AI provider configured. Open Settings.");
    };

    const importCSV = () => {
      if (!csvInput.trim()) return;
      const parsed = parseCollectionCSV(csvInput);
      if (parsed.format === "unknown") {
        setError("Couldn't identify this CSV. Expected Manabox or Moxfield columns (e.g. Name + Quantity / Count). Headers detected: " +
          (csvInput.split("\n")[0] || "").slice(0, 120));
        return;
      }
      if (!parsed.decks.length && !parsed.binders.length) {
        const src = parsed.format === "moxfield" ? "Moxfield" : "Manabox";
        setError(`No cards found in the ${src} CSV. Make sure you exported the full collection.`); return;
      }
      const di = {}; parsed.decks.forEach(d => { di[d.name] = false; });
      const bi = {}; parsed.binders.forEach(b => { bi[b.name] = true; });
      setGroups({ decks: parsed.decks, binders: parsed.binders });
      setDeckInc(di); setBinInc(bi);
      setParseStats({ ...parsed.stats, format: parsed.format });
      setError(""); setCsv("");
      setPhase("select");
    };

    // Import a single deck from a public Manabox share URL

          } else if (hasGroq && !hasGemini) {
            suggestion = "Groq's free tier rejects large deck-build requests. Add a free Gemini key in Settings (aistudio.google.com) — it has a much larger per-request budget and reliably handles 99-card decks.";
          } else if (hasGemini && !hasGroq) {
            suggestion = "Try switching the Gemini model in Settings to gemini-2.5-pro (slower but emits longer JSON reliably), or add a Groq key as fallback.";
          } else {
            suggestion = "Try switching to gemini-2.5-pro in Settings, or retry — this is usually transient.";
          }

          if (allApiErrors) {
            // No provider returned anything — show the API errors directly.
            const errs = tried.map(t =>
              `  • ${PROVIDERS[t.provider]?.label || t.provider}: ${(t.error || "unknown").slice(0, 200)}`
            ).join("\n");
            addLog(`❌ All providers rejected the request (${triedLabels}). No response to parse.`);
            tried.forEach(t =>
              addLog(`   ↳ ${PROVIDERS[t.provider]?.label || t.provider}: ${(t.error || "unknown").slice(0, 200)}`)
            );
            throw new Error(`${triedLabels} rejected the request. ${suggestion}`);
          }

          // Some provider DID respond — diagnose the parse failure.
          const raw     = safeParse.lastRaw || "";
          const len     = raw.length;
          const snippet = raw.slice(0, 800).replace(/\s+/g, " ");
          const truncated = len > 0 && !raw.trimEnd().endsWith("}");
          addLog(`❌ All providers failed (${triedLabels}). Last response: ${len} chars${truncated ? " (truncated)" : ""}.`);
          if (len > 0) addLog(`📝 First 800 chars: ${snippet}`);
          if (len > 800) addLog(`…(full response stashed for the error screen)`);

          throw new Error(truncated
            ? `${triedLabels} returned a truncated response. ${suggestion}`
            : `${triedLabels} returned an unparseable response. ${suggestion} Full output is in the build log below.`);
        }
        if (replyObj.provider !== aiOrder[0]) {
          addLog(`✅ ${PROVIDERS[replyObj.provider].label} produced a valid deck after fallback.`);
        }
        setProg(80);

        // Strip the commander itself from the 99-card mainboard if the AI
        // included it (it lives in the command zone, not the deck). Also
        // dedupe any other singleton violations from non-basic non-land cards.
        {
          const cmdrLower = (chosenCmd.card?.name || "").toLowerCase();
          let removedCommander = 0;
          const seenNames = new Set();
          deckData.categories.forEach(cat => {
            cat.cards = cat.cards.filter(c => {
              const nm = (c.name || "").toLowerCase();
              if (nm === cmdrLower) { removedCommander++; return false; }
              // Singleton dedupe — basics are exempt (handled by basicSet below).
              const isBasicName = ["plains","island","swamp","mountain","forest","wastes"].includes(nm);
              if (!isBasicName) {
                if (seenNames.has(nm)) return false;
                seenNames.add(nm);
              }
              return true;
            });
          });
          if (removedCommander > 0) addLog(`🛡️ Removed ${removedCommander} stray commander entr${removedCommander===1?"y":"ies"} from the mainboard.`);
        }

        // Post-process: ensure exactly 99 cards, with ≤ mech.lands lands.
        const MAX_LANDS = mech.lands;   // respect the user's construction target exactly
        const basicSet  = new Set(basics.concat(["Wastes"]));
        const isLandName = nm => {
          if (basicSet.has(nm)) return true;
          const c = allCards.find(e => e.name.toLowerCase() === nm.toLowerCase());
          return /land/i.test(c?.scryfall?.type_line || "");
        };
        const flatCount    = () => deckData.categories.reduce((s, c) => s + c.cards.length, 0);
        const flatNames    = () => deckData.categories.flatMap(c => c.cards.map(x => x.name.toLowerCase()));
        const countLands   = () => deckData.categories.flatMap(c => c.cards).filter(c => isLandName(c.name)).length;

        // 0. Relocate any land cards the AI placed in non-land categories into the Lands category.
        {
          let landCat = deckData.categories.find(c => /^lands?$/i.test(c.name.trim()));
          if (!landCat) {
            landCat = { name: "Lands", cards: [] };
            deckData.categories.push(landCat);
          }
          let relocated = 0;
          for (const cat of deckData.categories) {
            if (/^lands?$/i.test(cat.name.trim())) continue;
            const strays = cat.cards.filter(dc => isLandName(dc.name));
            if (strays.length > 0) {
              cat.cards   = cat.cards.filter(dc => !isLandName(dc.name));
              landCat.cards.push(...strays);
              relocated  += strays.length;
            }
          }
          if (relocated > 0)
            addLog(`↩ Moved ${relocated} land(s) from non-land categories → Lands.`);
        }

        // Helper: trim lands from all categories, basics first, then non-basics.
        const trimLands = (howMany) => {
          let over = howMany;
          // Pass A: remove basics (they are free to generate, so remove first).
          for (const cat of deckData.categories) {
            for (let n = cat.cards.length - 1; n >= 0 && over > 0; n--) {
              if (basicSet.has(cat.cards[n].name)) { cat.cards.splice(n, 1); over--; }
            }
            if (over === 0) return;
          }
          // Pass B: still over — remove non-basic lands from the Lands category (from the end).
          const lCat = deckData.categories.find(c => /^lands?$/i.test(c.name.trim()));
          if (lCat) {
            for (let n = lCat.cards.length - 1; n >= 0 && over > 0; n--) {
              if (isLandName(lCat.cards[n].name)) { lCat.cards.splice(n, 1); over--; }
            }
          }
        };

        // 1. Trim if total cards > 99.
        if (flatCount() > 99) {
          const over = flatCount() - 99;
          addLog(`⚠️ AI returned ${flatCount()} cards — trimming ${over} land(s) to reach 99.`);
          trimLands(over);
        }
        // 2. Trim if land count > MAX_LANDS (can happen when many utility lands land in wrong categories).
        if (countLands() > MAX_LANDS) {
          const over = countLands() - MAX_LANDS;
          addLog(`⚠️ ${countLands()} lands found — trimming ${over} to enforce cap of ${MAX_LANDS}.`);
          trimLands(over);
        }

        // 2. Fill shortfall: non-basics first, then basics only up to the land cap — never exceed it.
        if (flatCount() < 99) {
          let need = 99 - flatCount();
          const fillBasic = basics[0] || "Wastes";
          const used = new Set(flatNames());

          // Extra NON-LAND cards not yet in the deck, sorted by CMC ascending.
          // Lands MUST NOT enter the synergy/utility filler — they belong in the
          // Lands category and would inflate the land count past the user's cap.
          const extras = eligible
            .filter(c =>
              !used.has(c.name.toLowerCase()) &&
              !basicSet.has(c.name) &&
              !/land/i.test(c.scryfall?.type_line || ""))
            .sort((a, b) => (a.scryfall?.cmc || 0) - (b.scryfall?.cmc || 0));

          let synergyCat = deckData.categories.find(c => /synergy|utility|theme/i.test(c.name));
          if (!synergyCat) {
            synergyCat = { name: "Synergy / Utility", cards: [] };
            deckData.categories.push(synergyCat);
          }
          let landsCat = deckData.categories.find(c => /^lands?$/i.test(c.name.trim()));
          if (!landsCat) {
            landsCat = { name: "Lands", cards: [] };
            deckData.categories.push(landsCat);
          }

          let addedExtras = 0, basicsAdded = 0;

          // Pass 1: add non-basic extras (no land-cap concerns).
          while (need > 0 && extras.length > 0) {
            const c = extras.shift();
            synergyCat.cards.push({ name: c.name, reason: "Auto-added — synergy filler from collection" });
            need--; addedExtras++;
          }
          // Pass 2: fill remaining slots with basics, strictly up to the cap.
          while (need > 0 && countLands() < MAX_LANDS) {
            landsCat.cards.push({ name: fillBasic, reason: "Basic land filler" });
            need--; basicsAdded++;
          }
          // Pass 3: land cap reached and no more non-basics — leave the deck short rather than
          //         stuffing it with extra lands. Log a warning so the user knows.
          if (need > 0)
            addLog(`⚠️ Deck is ${flatCount()}/99 — collection too small to fill ${need} slot(s) without exceeding the land cap. Add more cards to your collection pool.`);

          if (addedExtras) addLog(`➕ Added ${addedExtras} extra non-basic synergy card(s) from collection.`);
          if (basicsAdded) addLog(`➕ Added ${basicsAdded}× ${fillBasic}.`);
        }
        deckData.categories = deckData.categories.map(cat => ({
          ...cat,
          cards: cat.cards.map(dc => {
            const found = allCards.find(e => e.name.toLowerCase() === dc.name.toLowerCase());
            const sf = found?.scryfall;
            const isBasic = ["Plains","Island","Swamp","Mountain","Forest","Wastes"].includes(dc.name);
            const basicCi = { Plains:["W"], Island:["U"], Swamp:["B"], Mountain:["R"], Forest:["G"], Wastes:[] }[dc.name] || [];
            return {
              ...dc,
              id: sf?.id || null,                       // Scryfall UUID — used for Archidekt API push
              img: sf?.image_uris?.small || sf?.card_faces?.[0]?.image_uris?.small || BASIC_IMG[dc.name] || null,
              mana_cost: sf?.mana_cost || sf?.card_faces?.[0]?.mana_cost || "",
              cmc: typeof sf?.cmc === "number" ? sf.cmc : 0,
              type_line: sf?.type_line || (isBasic ? `Basic Land — ${dc.name}` : ""),
              color_identity: sf?.color_identity || (isBasic ? basicCi : []),
              isLand: /land/i.test(sf?.type_line || (isBasic ? "Land" : "")),
              // Specific printing — used to push the EXACT version to Archidekt
              // instead of letting Archidekt pick its default.
              set:              sf?.set || null,
              collector_number: sf?.collector_number || null,
            };
          }),
        }));

        // ── POST-MAPPING LAND ENFORCEMENT ──────────────────────────────────────
        // isLand is now driven by real Scryfall type_line data.
        // Step A: anything the AI placed in the Lands category IS a land — force the flag
        //         so non-collection utility lands (not in allCards) are caught too.
        deckData.categories.forEach(cat => {
          if (/^lands?$/i.test(cat.name.trim())) cat.cards.forEach(c => { c.isLand = true; });
        });

        // Step A2: relocate any stray lands found in NON-Lands categories to the Lands
        //          category. (Catches utility lands the AI mis-classified, or lands the
        //          shortfall filler would have placed in Synergy in older runs.)
        {
          let landCat2 = deckData.categories.find(c => /^lands?$/i.test(c.name.trim()));
          if (!landCat2) { landCat2 = { name: "Lands", cards: [] }; deckData.categories.push(landCat2); }
          let strayCount = 0;
          for (const cat of deckData.categories) {
            if (/^lands?$/i.test(cat.name.trim())) continue;
            const strays = cat.cards.filter(c => c.isLand);
            if (strays.length > 0) {
              cat.cards = cat.cards.filter(c => !c.isLand);
              landCat2.cards.push(...strays);
              strayCount += strays.length;
            }
          }
          if (strayCount > 0)
            addLog(`↩ Moved ${strayCount} stray land(s) from non-land categories → Lands.`);
        }

        // Step B: count confirmed land cards and replace excess with non-land cards.
        const postLands = () => deckData.categories.flatMap(c => c.cards).filter(c => c.isLand).length;

        if (postLands() > MAX_LANDS) {
          const excess = postLands() - MAX_LANDS;
          addLog(`🔍 Post-check: ${postLands()} lands — replacing ${excess} with non-land synergy cards.`);

          // Build replacement pool: eligible non-land, non-token cards not already in the deck.
          const inDeck = new Set(deckData.categories.flatMap(c => c.cards.map(x => x.name.toLowerCase())));
          const pool = eligible
            .filter(c =>
              !inDeck.has(c.name.toLowerCase()) &&
              !/land/i.test(c.scryfall?.type_line || "") &&
              !/token/i.test(c.scryfall?.type_line || ""))
            .sort((a, b) => (a.scryfall?.cmc || 0) - (b.scryfall?.cmc || 0));

          let synCat = deckData.categories.find(c => /synergy|utility/i.test(c.name));
          if (!synCat) { synCat = { name: "Synergy / Utility", cards: [] }; deckData.categories.push(synCat); }
          const landCat = deckData.categories.find(c => /^lands?$/i.test(c.name.trim()));

          let replaced = 0, dropped = 0;
          const doSwap = (cat, idx) => {
            const r = pool.shift();
            cat.cards.splice(idx, 1);
            if (r) {
              const sf2 = r.scryfall;
              synCat.cards.push({
                name: r.name, reason: "Auto-added — replaces excess land",
                id: sf2?.id || null,
                img: sf2?.image_uris?.small || sf2?.card_faces?.[0]?.image_uris?.small || null,
                mana_cost: sf2?.mana_cost || sf2?.card_faces?.[0]?.mana_cost || "",
                cmc: typeof sf2?.cmc === "number" ? sf2.cmc : 0,
                type_line: sf2?.type_line || "",
                color_identity: sf2?.color_identity || [],
                isLand: false,
              });
              replaced++;
            } else { dropped++; }
          };

          // Remove basics first (easiest to replace), then non-basics.
          if (landCat) {
            for (let n = landCat.cards.length - 1; n >= 0 && replaced + dropped < excess; n--)
              if (basicSet.has(landCat.cards[n].name)) doSwap(landCat, n);
            for (let n = landCat.cards.length - 1; n >= 0 && replaced + dropped < excess; n--)
              if (landCat.cards[n]?.isLand) doSwap(landCat, n);
          }

          if (replaced) addLog(`♻️ Swapped ${replaced} excess land(s) for synergy cards from your collection.`);
          if (dropped)  addLog(`🗑️ Removed ${dropped} excess land(s) — collection had no more non-land replacements.`);
        }

        // Re-count after post-mapping enforcement.
        const finalTotal = deckData.categories.reduce((s, c) => s + c.cards.length, 0);
        const finalLands = deckData.categories.flatMap(c => c.cards).filter(c => c.isLand).length;
        addLog(`✅ ${finalTotal} cards · ${finalLands} lands${finalTotal === 99 ? " (Commander legal)" : ` — ⚠️ expected 99`}.`);
        deckData.edhrecSuggestions = edhrecSuggestions;   // cards to acquire
        deckData.combosHave        = cspbHave;            // combos achievable now
        deckData.combosAlmost      = cspbAlmost;          // combos one card away
        setDeck(deckData); setProg(100); setPhase("deck");
      } catch(e) { setError(e.message); setPhase("error"); }
    }, [enriched, usable, apiKeys, provider, models, bracket, archetypes, budget, mech]);

    const exportDeck = () => {
      // Plain "QTY Name" lines only — no `//` comments or category headers.
      // Moxfield's import treats `//` as a syntax error (it's the MTG
      // double-faced-card separator there). Archidekt / TappedOut / etc.
      // accept the bare form fine too. Categories are preserved when
      // pushing via the Archidekt API.
      const lines = [`1 ${selCmd.card.name}`];
      deck.categories.forEach(cat => cat.cards.forEach(c => lines.push(`1 ${c.name}`)));
      const txt = lines.join("\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([txt], { type:"text/plain" }));
      a.download = `${selCmd.card.name.replace(/\s+/g,"_")}_commander.txt`;
      a.click();
    };

    // ── Archidekt: Test Login button in Settings ───────────────────────────
    const archTestLogin = async () => {
      const u = (archUser || "").trim();
      const p = (archPass || "").trim();
      if (!u || !p) {
        setArchStatus("fail");
        setArchStatusMsg("Username and password are required.");
        return;
      }
      setArchStatus("testing"); setArchStatusMsg("");
      try {
        const tok = await archLogin(u, p);
        setArchToken(tok);
        localStorage.setItem(LS_ARCH_TOKEN, tok);
        // Also persist creds immediately so the user doesn't have to click Save & Continue.
        localStorage.setItem(LS_ARCH_CREDS, JSON.stringify({ username: u, password: p }));
        setArchStatus("ok");
        setArchStatusMsg("Logged in — token cached.");
      } catch (e) {
        // Distinguish CORS / network from auth failures: a TypeError from fetch is
        // almost always CORS/network in the browser.
        const isNetwork = e?.name === "TypeError";
        setArchStatus("fail");
        setArchStatusMsg(isNetwork
          ? "Network/CORS blocked the request. The browser may not be allowed to call archidekt.com directly — the deck-push button will fall back to the clipboard flow."
          : (e.message || "Login failed."));
      }
    };

    // ── Clipboard fallback (kept as a private helper, not surfaced as a button) ──
    const archClipboardFallback = async () => {
      let txt = `1 ${selCmd.card.name}\n\n`;
      deck.categories.forEach(cat => cat.cards.forEach(c => (txt += `1 ${c.name}\n`)));
      try { await navigator.clipboard.writeText(txt); } catch {}
      window.open("https://archidekt.com/decks/new", "_blank");
    };

    // ── Archidekt: Push the current deck to a brand-new Archidekt deck ─────
    const pushToArchidekt = async () => {
      if (!archCredsSaved || !selCmd || !deck) return;
      setArchResult(null);

      // Flatten deck into [{ name, id, category }] including the commander.
      const allCards = [
        { name: selCmd.card.name, id: selCmd.card?.scryfall?.id || null, category: "Commander" },
        ...deck.categories.flatMap(cat =>
          cat.cards.map(c => ({ name: c.name, id: c.id || null, category: cat.name }))),
      ];
      const total = allCards.length;
      setArchPushing({ phase: "login", done: 0, total });

      // 1) Ensure we have a working token. Try cached → re-login on 401.
      const ensureToken = async (force = false) => {
        if (!force && archToken) return archToken;
        const tok = await archLogin(archUser.trim(), archPass.trim());
        setArchToken(tok);
        localStorage.setItem(LS_ARCH_TOKEN, tok);
        return tok;
      };

      try {
        let token = await ensureToken();

        // 2) Create the empty deck. Cards/categories are added separately via
        //    massDeckEdit — Archidekt's UI uses the same two-step flow.
        setArchPushing({ phase: "creating", done: 0, total });
        const deckName = `${selCmd.card.name} — ${deck.theme || "Commander"}`;
        const desc = (deck.description || "").slice(0, 1500)
          + "\n\n— Generated by Commander Forge.";
        const archEdhBracket = (typeof bracket === "number" && bracket >= 1 && bracket <= 5) ? bracket : null;
        let deckId;
        try {
          deckId = await archCreateDeck(token, { name: deckName, description: desc, deckFormat: 3, isPrivate: true, edhBracket: archEdhBracket });
        } catch (e) {
          if (e.status === 401 || e.status === 403) {
            token = await ensureToken(true);
            deckId = await archCreateDeck(token, { name: deckName, description: desc, deckFormat: 3, isPrivate: true, edhBracket: archEdhBracket });
          } else { throw e; }
        }
        addLog(`✅ Archidekt deck #${deckId} created.`);

        // 3) Build the Archidekt-format deck-list text, then run a 2-step save:
        //    a) POST /api/cards/massDeckEdit/ — parses text → cards w/ internal IDs
        //    b) PATCH /api/decks/{id}/modifyCards/v2/ — persists to deck
        //    This is exactly what Archidekt's "Import Cards" UI does internally.
        // Each entry tracks the SPECIFIC printing the user owns (set code +
        // collector number from Scryfall) so Archidekt pulls in that exact
        // version instead of falling back to its default printing. Cards
        // grouped by (name, category, set, collector_number) — distinct
        // printings of the same card stay separate.
        const tally = new Map();
        const order = [];
        const pushCard = (name, category, set, cn) => {
          const key = `${name}|${category}|${set || ""}|${cn || ""}`;
          if (!tally.has(key)) {
            tally.set(key, 0);
            order.push({ name, category, set, cn, key });
          }
          tally.set(key, tally.get(key) + 1);
        };
        // Commander: take its specific printing from selCmd.
        const cmdrSF = selCmd.card?.scryfall || {};
        pushCard(selCmd.card.name, "Commander", cmdrSF.set || null, cmdrSF.collector_number || null);
        deck.categories.forEach(cat =>
          cat.cards.forEach(c => pushCard(c.name, cat.name, c.set || null, c.collector_number || null))
        );
        // Archidekt-accepted format: "QTY Card Name (set) cn [Category]".
        // The set+cn block is optional — Archidekt's parser falls back to
        // the default printing when missing, so cards without a known
        // printing still import (just with whatever Archidekt picks).
        const deckListText = order
          .map(o => {
            const qty   = tally.get(o.key);
            const setCn = (o.set && o.cn) ? ` (${o.set.toUpperCase()}) ${o.cn}` : "";
            return `${qty} ${o.name}${setCn} [${o.category}]`;
          })
          .join("\n");

        // Cache as clipboard fallback in case the save flow fails.
        try { await navigator.clipboard.writeText(deckListText); } catch {}

        // 3a) Parse text → card objects with Archidekt internal IDs.
        setArchPushing({ phase: "adding", done: 0, total });
        let parsed;
        try {
          try {
            parsed = await archParseDeckText(token, deckListText);
          } catch (e) {
            if (e.status === 401 || e.status === 403) {
              token = await ensureToken(true);
              parsed = await archParseDeckText(token, deckListText);
            } else { throw e; }
          }
        } catch (e) {
          addLog(`❌ Parse step failed: ${(e.message || "").slice(0, 200)}`);
          if (e.body) addLog(`   raw: ${JSON.stringify(e.body).slice(0, 300)}`);
          throw e;
        }

        const toAdd        = parsed?.toAdd        || [];
        const syntaxErrors = parsed?.syntaxErrors || [];
        const cardErrors   = parsed?.cardErrors   || [];
        addLog(`✅ Parser: ${toAdd.length} card entries resolved${(syntaxErrors.length || cardErrors.length) ? `, ${syntaxErrors.length + cardErrors.length} couldn't be matched` : ""}.`);
        [...syntaxErrors, ...cardErrors].slice(0, 5).forEach(e =>
          addLog(`   ▸ ${(typeof e === "string" ? e : JSON.stringify(e)).slice(0, 140)}`));

        // 3b) Persist via modifyCards/v2/.
        if (toAdd.length === 0) {
          throw new Error("Parser returned no cards — nothing to save. Check syntax/card errors above.");
        }
        try {
          try {
            await archModifyCards(token, deckId, toAdd);
          } catch (e) {
            if (e.status === 401 || e.status === 403) {
              token = await ensureToken(true);
              await archModifyCards(token, deckId, toAdd);
            } else { throw e; }
          }
        } catch (e) {
          addLog(`❌ Save step failed: ${(e.message || "").slice(0, 200)}`);
          if (e.body) addLog(`   raw: ${JSON.stringify(e.body).slice(0, 300)}`);
          throw e;
        }
        addLog(`✅ Persisted ${toAdd.length} card entries to deck via modifyCards/v2/.`);
        setArchPushing({ phase: "adding", done: total, total });

        // 4) Done — open the deck page.
        const url = `https://archidekt.com/decks/${deckId}`;
        setArchPushing(false);
        const skipped = syntaxErrors.length + cardErrors.length;

        // 4a) Pull back Archidekt's computed insights (salt sum, est. bracket,
        // cost totals, format errors). This is best-effort — if the fetch
        // fails the push still succeeded, we just don't show the panel.
        let insights = null;
        try {
          const deckResp = await archGetDeck(token, deckId);
          insights = extractArchInsights(deckResp);
          if (insights) {
            const bits = [];
            if (insights.salt != null)       bits.push(`salt ${insights.salt}`);
            if (insights.bracket != null)    bits.push(`bracket ${insights.bracket}`);
            if (insights.prices.tcg != null) bits.push(`$${insights.prices.tcg}`);
            if (insights.errors.length)      bits.push(`${insights.errors.length} issue(s)`);
            if (bits.length) addLog(`📊 Archidekt insights: ${bits.join(" · ")}.`);
          }
        } catch (e) {
          addLog(`ℹ️ Couldn't fetch deck insights: ${(e?.message || e).toString().slice(0, 120)}.`);
        }

        setArchResult({
          kind: "ok",
          url,
          msg: skipped > 0
            ? `Deck created with ${total - skipped}/${total} cards (${skipped} couldn't be matched — see build log).`
            : `Deck created with all ${total} cards.`,
          insights,
        });
        window.open(url, "_blank");
      } catch (e) {
        // Any other failure — clipboard fallback so the user can finish manually.
        setArchPushing(false);
        const isNetwork = e?.name === "TypeError";
        const reason = isNetwork
          ? "Network/CORS blocked the request"
          : (e.message || "Unknown error");
        await archClipboardFallback();
        setArchResult({
          kind: "fallback",
          url: "https://archidekt.com/decks/new",
          msg: `${reason} — fell back to clipboard. Deck list copied; paste it into the new-deck page.`,
        });
      }
    };

    const saveDeck = () => {
      const basics = new Set(Object.values(BASIC_LAND));
      const used   = new Set(
        deck.categories.flatMap(cat => cat.cards.map(c => c.name.toLowerCase()))
          .filter(n => !basics.has(n))
      );
      used.add(selCmd.card.name.toLowerCase());
      const remaining = usable.filter(c => !used.has(c.name.toLowerCase()));
      localStorage.setItem(LS_CARDS, JSON.stringify(remaining));
      setUsable(remaining); setDeckSvd(true);
    };

    // Save the freshly-generated deck back into the Collection as a navigable
    // deck entry (just like a Manabox-imported deck). Cards are claimed from
    // the user's binders qty-by-qty so the pool reflects what's still free.
    //
    // Behaviour:
    //   - Adds groups.decks[<title>] with source="generated", full deck object
    //     preserved so the preview later can render commander art / mana curve.
    //   - For each non-basic card in the deck: decrements 1 from the first
    //     binder/deck that still has stock. Basics are unlimited so we don't
    //     touch them.
    //   - Sets deckInc[title]=false so the deck is excluded from the eligible
    //     pool by default (the cards are reserved). User can toggle ON later
    //     to release them.
    const saveDeckToCollection = () => {
      const basics    = new Set([...Object.values(BASIC_LAND), "Wastes"]);
      const cmdrName  = selCmd?.card?.name || "Commander";
      const themePart = (deck?.theme || "").trim();
      const baseTitle = themePart
        ? `Forge: ${cmdrName} · ${themePart}`
        : `Forge: ${cmdrName}`;
      // Avoid collisions if user saves multiple decks for the same commander.
      let title = baseTitle, counter = 2;
      while (groups.decks.some(d => d.name === title)) {
        title = `${baseTitle} (${counter++})`;
      }

      // Build the card list for this saved-deck entry (flatten categories).
      const deckCards = deck.categories.flatMap(cat =>
        cat.cards.map(c => ({ name: c.name, qty: 1, id: "" }))
      );
      // Merge duplicates (e.g. basic lands appearing multiple times).
      const merged = new Map();
      for (const c of deckCards) {
        if (merged.has(c.name)) merged.get(c.name).qty += c.qty;
        else merged.set(c.name, { ...c });
      }
      // Add commander itself (it's the 100th card; lives in the same deck row).
      if (!merged.has(cmdrName)) merged.set(cmdrName, { name: cmdrName, qty: 1, id: "" });

      // Subtract non-basic cards from binders. We mutate copies of the binder
      // entries to keep the original `groups` object untouched until we apply
      // the new state at the end.
      const nextDecks   = [...groups.decks];
      const nextBinders = groups.binders.map(b => ({
        ...b, cards: b.cards.map(c => ({ ...c })),   // deep-ish copy
      }));
      for (const card of merged.values()) {
        if (basics.has(card.name)) continue;   // unlimited
        if (card.name === cmdrName) continue;  // commander not necessarily in binder
        let needed = card.qty;
        for (const bin of nextBinders) {
          if (needed <= 0) break;
          const entry = bin.cards.find(c => c.name === card.name && (c.qty || 0) > 0);
          if (!entry) continue;
          const take = Math.min(entry.qty, needed);
          entry.qty -= take;
          needed    -= take;
        }
        // Trim zero-qty entries so the binder view stays clean.
      }
      for (const bin of nextBinders) {
        bin.cards = bin.cards.filter(c => (c.qty || 0) > 0);
      }

      const newEntry = {
        name: title,
        type: "deck",
        cards: [...merged.values()],
        commanderName: cmdrName,
        source: "generated",
        savedAt: Date.now(),
        // Preserve the full deck object so the Collection preview can render
        // mana curve / categories / commander art identically to the Library.
        deckData: deck,
        selCmd: selCmd,
      };
      nextDecks.push(newEntry);

      const nextGroups  = { decks: nextDecks, binders: nextBinders };
      const nextDeckInc = { ...deckInc, [title]: false };
      const nextUsable  = computeUsable(nextGroups, nextDeckInc, binInc);

      setGroups(nextGroups);
      setDeckInc(nextDeckInc);
      setUsable(nextUsable);
      localStorage.setItem(LS_BINDERS, JSON.stringify({
        groups: nextGroups, deckInc: nextDeckInc, binInc,
      }));
      localStorage.setItem(LS_CARDS, JSON.stringify(nextUsable));
      setDeckSvd(true);
    };

    const saveDeckToLibrary = () => {
      const entry = {
        id: Date.now(),
        savedAt: new Date().toISOString(),
        selCmd,
        deck,
      };
      const updated = [entry, ...library];   // newest first
      setLibrary(updated);
      localStorage.setItem(LS_LIBRARY, JSON.stringify(updated));
      setLibSaved(true);
    };

    const deleteFromLibrary = id => {
      const updated = library.filter(e => e.id !== id);
      setLibrary(updated);
      localStorage.setItem(LS_LIBRARY, JSON.stringify(updated));
    };

    const loadFromLibrary = entry => {
      // Preserve the user's in-progress built deck if there is one — opening
      // a saved deck shouldn't silently lose unsaved work. We restore it via
      // the "↩ Back to your built deck" button in the deck view.
      if (!fromSaved && deck && selCmd) {
        setUnsavedDeck({ deck, selCmd });
      }
      setSelCmd(entry.selCmd);
      setDeck(entry.deck);
      setFromSaved(true);
      setLibSaved(true);   // already saved — no need to offer again
      setDeckSvd(false);
      setError("");
      setPhase("deck");
    };

    // ── Imported-deck enrichment ───────────────────────────────────────────
    // Run the same enrichment pipeline used by buildDeck (Scryfall + EDHRec +
    // Commander Spellbook) over a raw imported deck so it appears in the Deck
    // view with full visuals: commander art, type-line categories, mana curve,
    // EDHRec acquire-suggestions, and any combos achievable from the deck's
    // cards. Result is cached on the deck entry (entry.deckData / entry.selCmd /
    // entry.enrichedAt) so subsequent opens are instant and the cache syncs
    // via the same KV mechanism that handles all of groups.decks.
    const enrichImportedDeck = async (rawDeck) => {
      // Manabox doesn't always include a commander flag, and Moxfield never
      // does (its "Haves" export is a flat collection). We start with
      // whatever's in the CSV, then auto-detect below if missing.
      let cmdrName  = rawDeck.commanderName || "";
      const uniq    = new Set([cmdrName, ...rawDeck.cards.map(c => c.name)].filter(Boolean));
      const reqList = [...uniq].map(n => ({ name: n, qty: 1, id: "" }));

      addLog(`🔍 Looking up ${uniq.size} unique card${uniq.size === 1 ? "" : "s"} on Scryfall…`);
      const sfResults = await fetchAllScryfall(reqList,
        p => setProg(Math.min(60, Math.round(p * 0.6))),
        msg => addLog("   " + msg),
      );
      const sfByName = new Map(sfResults.map(c => [c.name.toLowerCase(), c]));

      // ── Precon detection ────────────────────────────────────────────────
      // If every card in the deck (commander included) comes from the same
      // Scryfall set, it's almost certainly a precon. Tokens / non-card
      // entries are skipped since they don't have a meaningful set tag for
      // this purpose. Excludes basics with no set — basics in precons usually
      // have a real set code, but we still want to be tolerant if Scryfall
      // returns a generic basic.
      let precon = null;   // { setCode, setName } when detected
      {
        const setBag = new Map();   // code → name (most-recent wins; they're identical anyway)
        let unsetCount = 0;
        for (const c of sfResults) {
          const sf = c.scryfall || {};
          if (sf.set_type === "token") continue;
          if (!sf.set) { unsetCount++; continue; }
          setBag.set(sf.set, sf.set_name || sf.set);
        }
        // Don't claim "precon" if some cards have no set data at all (Scryfall
        // failures would mask non-precon decks as precons).
        if (setBag.size === 1 && unsetCount === 0 && sfResults.length >= 50) {
          const [code, name] = [...setBag.entries()][0];
          precon = { setCode: code, setName: name };
          addLog(`🎁 Detected as a precon — all ${sfResults.length} cards from “${name}” (${code.toUpperCase()}).`);
        } else if (setBag.size > 1 && setBag.size <= 3 && sfResults.length >= 50) {
          // A near-precon: 2-3 sets covering everything. Mention it as a hint
          // for partially-reprinted precons (e.g. a Commander deck where a
          // few cards came from a different printing).
          const counts = new Map();
          sfResults.forEach(c => {
            const s = c.scryfall?.set;
            if (s) counts.set(s, (counts.get(s) || 0) + 1);
          });
          // Look for a dominant set (>= 90% of cards from it).
          const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1]);
          const [topCode, topCount] = sorted[0];
          if (topCount / sfResults.length >= 0.9) {
            precon = { setCode: topCode, setName: setBag.get(topCode) || topCode, partial: true };
            addLog(`🎁 Likely a precon — ${topCount}/${sfResults.length} cards from “${precon.setName}” (${topCode.toUpperCase()}).`);
          }
        }
      }

      // ── Commander auto-detection ────────────────────────────────────────
      // If the CSV didn't tell us which card is the commander, scan the deck
      // for legal commanders (legendary creatures + planeswalkers/cards with
      // "can be your commander" text — using the same isCommander() helper
      // that the Commanders list uses). Pick the most popular one by
      // edhrec_rank as a sensible default.
      let autoDetected = false;
      let allCandidates = [];
      if (!cmdrName) {
        allCandidates = sfResults.filter(c => isCommander(c.scryfall || {}));
        if (allCandidates.length > 0) {
          // Sort by EDHRec popularity (lower rank = more popular). Cards
          // without a rank go last.
          allCandidates.sort((a, b) => {
            const ra = a.scryfall?.edhrec_rank ?? Infinity;
            const rb = b.scryfall?.edhrec_rank ?? Infinity;
            return ra - rb;
          });
          cmdrName = allCandidates[0].name;
          autoDetected = true;
          if (allCandidates.length === 1) {
            addLog(`👑 Commander auto-detected: ${cmdrName} (only legendary in the deck).`);
          } else {
            addLog(`👑 Commander auto-detected: ${cmdrName} ` +
                   `(top of ${allCandidates.length} candidates by EDHRec rank).`);
          }
        } else {
          addLog(`ℹ️ No commander flagged in the CSV and no legal commanders found in the deck — ` +
                 `rendering without a commander. (You can re-export from Manabox with the "Commander" column filled in.)`);
        }
      }

      // Commander selCmd object — shape matches what loadCollectionDeck/
      // loadFromLibrary expect, so the Deck view renders correctly.
      const cmdrEnr   = sfByName.get(cmdrName.toLowerCase());
      const selCmdObj = {
        name:     cmdrName,
        theme:    autoDetected ? "Imported (commander auto-detected)" : "Imported",
        reason:   "Imported from collection",
        strategy: "",
        card:     cmdrEnr || (cmdrName ? { name: cmdrName, scryfall: {} } : null),
        // Save the full candidate list so we can show a picker later if the
        // user wants to pick a different commander from the same deck.
        commanderCandidates: allCandidates.map(c => c.name),
      };

      // Categorise cards by type_line so the Deck view's category-pills,
      // mana-curve and type-breakdown all light up correctly.
      const BASICS = new Set(["Plains","Island","Swamp","Mountain","Forest","Wastes"]);
      const BASIC_CI = { Plains:["W"], Island:["U"], Swamp:["B"], Mountain:["R"], Forest:["G"], Wastes:[] };
      const CAT_ORDER = ["Lands","Creatures","Instants","Sorceries","Enchantments","Artifacts","Planeswalkers","Battles","Other"];
      const byCat = Object.fromEntries(CAT_ORDER.map(c => [c, []]));
      const categorise = tl => {
        const t = (tl || "").toLowerCase();
        if (/\bland\b/.test(t))         return "Lands";
        if (/creature/.test(t))         return "Creatures";
        if (/instant/.test(t))          return "Instants";
        if (/sorcery/.test(t))          return "Sorceries";
        if (/enchantment/.test(t))      return "Enchantments";
        if (/artifact/.test(t))         return "Artifacts";
        if (/planeswalker/.test(t))     return "Planeswalkers";
        if (/battle/.test(t))           return "Battles";
        return "Other";
      };

      for (const raw of (rawDeck.cards || [])) {
        if (raw.name === cmdrName) continue;   // commander stays in the command zone
        const sfEntry = sfByName.get(raw.name.toLowerCase());
        const sf      = sfEntry?.scryfall || {};
        const isBasic = BASICS.has(raw.name);
        const tl      = sf.type_line || (isBasic ? `Basic Land — ${raw.name}` : "");
        const card = {
          name:             raw.name,
          reason:           "",
          img:              sf.image_uris?.small || sf.card_faces?.[0]?.image_uris?.small || BASIC_IMG[raw.name] || null,
          mana_cost:        sf.mana_cost || sf.card_faces?.[0]?.mana_cost || "",
          cmc:              typeof sf.cmc === "number" ? sf.cmc : 0,
          type_line:        tl,
          color_identity:   sf.color_identity || (isBasic ? BASIC_CI[raw.name] : []) || [],
          isLand:           /\bland\b/i.test(tl) || isBasic,
          // Specific printing for Archidekt push (keeps user's exact version).
          id:               sf.id || null,
          set:              sf.set || null,
          collector_number: sf.collector_number || null,
        };
        const cat = categorise(tl);
        for (let i = 0; i < (raw.qty || 1); i++) byCat[cat].push({ ...card });
      }
      const categories = CAT_ORDER
        .map(name => ({ name, cards: byCat[name] }))
        .filter(c => c.cards.length > 0);

      // ── EDHRec synergy suggestions ──
      setProg(70);
      addLog("🌐 Fetching EDHRec synergy data…");
      let edhrecSuggestions = [];
      try {
        const result = await fetchEDHRec(cmdrEnr?.scryfall || cmdrName);
        if (result?.status === "ok" && result.suggestions?.length) {
          const inDeck = new Set([...uniq].map(n => n.toLowerCase()));
          edhrecSuggestions = result.suggestions
            .filter(c => !inDeck.has(c.name.toLowerCase()) && !BASICS.has(c.name))
            .slice(0, 20);
          addLog(`✅ EDHRec: ${edhrecSuggestions.length} cards-to-acquire suggested.`);
        } else if (result?.status) {
          addLog(`ℹ️ EDHRec unavailable (${result.status}).`);
        }
      } catch (e) {
        addLog(`ℹ️ EDHRec fetch failed: ${(e?.message || e).toString().slice(0, 80)}.`);
      }

      // ── Commander Spellbook combos ──
      setProg(85);
      addLog("💥 Querying Commander Spellbook for combos…");
      let combosHave = [], combosAlmost = [];
      try {
        const cspb = await fetchCommanderSpellbook(cmdrName, [...uniq]);
        if (cspb?.status === "ok") {
          combosHave   = cspb.have   || [];
          combosAlmost = cspb.almost || [];
          addLog(`✅ Spellbook: ${combosHave.length} ready combo(s), ${combosAlmost.length} one-card-away.`);
        } else if (cspb?.status) {
          addLog(`ℹ️ Spellbook unavailable (${cspb.status}).`);
        }
      } catch (e) {
        addLog(`ℹ️ Spellbook fetch failed: ${(e?.message || e).toString().slice(0, 80)}.`);
      }

      setProg(95);
      const totalRendered = categories.reduce((s, c) => s + c.cards.length, 0);
      const preconLine = precon
        ? ` Precon: ${precon.setName} (${precon.setCode.toUpperCase()})${precon.partial ? " — mostly" : ""}.`
        : "";
      const enrichedDeck = {
        theme:       rawDeck.name,
        description: `Imported deck — ${totalRendered} cards categorised by type.${preconLine}` +
                     (cmdrEnr ? "" : " (Commander not found in Scryfall — basic name only.)"),
        warnings:    [],
        categories,
        edhrecSuggestions,
        combosHave,
        combosAlmost,
        precon,   // null | { setCode, setName, partial? }
      };

      return { selCmd: selCmdObj, deck: enrichedDeck };
    };

    // Open an imported deck. If we've already enriched it (deckData cached on
    // the entry), we open instantly. Otherwise we run the enrichment pipeline
    // first, surface progress via the standard loading UI, then cache the
    // result on the entry so the next open is instant.
    const openImportedDeck = async (rawDeck, returnTo = "library") => {
      // Cache hit — open immediately.
      if (rawDeck.deckData && rawDeck.selCmd) {
        if (!fromSaved && !fromCollection && deck && selCmd) {
          setUnsavedDeck({ deck, selCmd });
        }
        setSelCmd(rawDeck.selCmd);
        setDeck(rawDeck.deckData);
        setFromSaved(returnTo === "library");
        setFromCollection(returnTo === "collection");
        setLibSaved(true);
        setDeckSvd(true);
        setError("");
        setPhase("deck");
        return;
      }

      // Cache miss — enrich. Use the existing loading screen.
      setPhase("enriching");
      setLog([]); setProg(0); setError("");
      addLog(`📦 Enriching imported deck "${rawDeck.name}"…`);

      try {
        const { selCmd: enrSel, deck: enrDeck } = await enrichImportedDeck(rawDeck);

        // Persist back to groups.decks so subsequent opens are instant + cloud-synced.
        // If the commander was auto-detected (no commanderName in the CSV), also
        // bake the detected commander name into the deck entry so it sticks.
        const updatedDecks = groups.decks.map(d =>
          d.name === rawDeck.name
            ? {
                ...d,
                deckData:      enrDeck,
                selCmd:        enrSel,
                enrichedAt:    Date.now(),
                commanderName: d.commanderName || enrSel?.name || null,
              }
            : d
        );
        const nextGroups = { ...groups, decks: updatedDecks };
        setGroups(nextGroups);
        localStorage.setItem(LS_BINDERS, JSON.stringify({ groups: nextGroups, deckInc, binInc }));

        setProg(100);
        addLog(`✅ Ready — opening "${rawDeck.name}".`);

        // Preserve unsaved built deck if any.
        if (!fromSaved && !fromCollection && deck && selCmd) {
          setUnsavedDeck({ deck, selCmd });
        }
        setSelCmd(enrSel);
        setDeck(enrDeck);
        setFromSaved(returnTo === "library");
        setFromCollection(returnTo === "collection");
        setLibSaved(true);
        setDeckSvd(true);
        setPhase("deck");
      } catch (e) {
        setError(`Couldn't enrich deck: ${e?.message || e}`);
        setPhase("error");
      }
    };

    // Open a saved-to-collection deck in the full Deck view (the same one used
    // for freshly-built decks and Library entries). Generated decks carry both
    // `selCmd` and `deckData`, so we can reconstruct the view identically.
    // Goes to phase "deck" with fromCollection=true so the Back button returns
    // to the Collection rather than the Library.
    const loadCollectionDeck = d => {
      if (d.source !== "generated" || !d.deckData || !d.selCmd) return;
      // Preserve any unsaved built deck the same way loadFromLibrary does.
      if (!fromSaved && !fromCollection && deck && selCmd) {
        setUnsavedDeck({ deck, selCmd });
      }
      setSelCmd(d.selCmd);
      setDeck(d.deckData);
      setFromSaved(false);
      setFromCollection(true);
      setLibSaved(false);    // collection-saved decks aren't necessarily in Library
      setDeckSvd(true);      // already in Collection — hide that button
      setError("");
      setPhase("deck");
    };

    const restoreUnsavedDeck = () => {
      if (!unsavedDeck) return;
      setDeck(unsavedDeck.deck);
      setSelCmd(unsavedDeck.selCmd);
      setFromSaved(false);
      setFromCollection(false);
      setLibSaved(false);
      setUnsavedDeck(null);
      setPhase("deck");
    };

    const resetHome = () => {
      setPhase("ready"); setDeck(null); setSelCmd(null);
      setCands([]); setLog([]); setEnriched([]); setDeckSvd(false);
      setLibSaved(false); setFromSaved(false); setFromCollection(false); setUnsavedDeck(null);
      setError(""); setTab("build");
    };

    const navToCollection = () => {
      if (groups.decks.length || groups.binders.length) setPhase("select");
      else setPhase("import");
    };

    // ── Shared loading screen ────────────────────────────────────────────────
    const isLoading = ["loading_cmdr","analyzing","building","enriching"].includes(phase);
    const loadingTitle = phase === "loading_cmdr" ? "Scanning collection for commanders…"
      : phase === "analyzing"  ? "AI is picking commanders…"
      : phase === "enriching"  ? "Enriching imported deck — Scryfall · EDHRec · Spellbook…"
      : `Building deck for ${selCmd?.name || "…"}`;

    // ── Render ───────────────────────────────────────────────────────────────
    const showNav = !["init","setup"].includes(phase);

    return html`
      <div style=${{ minHeight:"100vh", background:"#f2ebe0", paddingBottom:60 }}>

        <!-- Header / Nav -->
        <div ref=${headerRef} style=${{
          background:"#7a2e0e", boxShadow:"0 2px 10px rgba(0,0,0,0.18)",
          position:"sticky", top:0, zIndex:200,
        }}>
          <div style=${{ maxWidth:1280, margin:"0 auto", padding:"14px 20px 0" }}>
            <div style=${{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style=${{ fontSize:9, letterSpacing:5, color:"#f0c080",
                  textTransform:"uppercase", marginBottom:2 }}>Commander Forge</div>
                <h1 style=${{ margin:0, fontSize:22, color:"#fff8f0", fontWeight:700 }}>MTG Deck Builder</h1>
              </div>
              ${(() => {
                // Sync chip is ALWAYS visible (even during setup) so users can see
                // login + sync state at a glance. Card-count summary is conditional
                // because it has no meaning before the collection's imported.
                const cs = cloudSync;
                let syncDot, syncLine;
                if (cs.status === "init" || cs.status === "checking" || cs.status === "pulling") {
                  syncDot  = { bg:"#f0c080", glow:"rgba(240,192,128,0.55)" };
                  syncLine = "Syncing…";
                } else if (cs.error) {
                  syncDot  = { bg:"#e85040", glow:"rgba(232,80,64,0.5)" };
                  syncLine = cs.error;
                } else if (cs.status === "active" || cs.status === "ready") {
                  syncDot  = { bg:"#5ac870", glow:"rgba(90,200,112,0.5)" };
                  const ago = cs.lastSync ? Math.max(0, Math.floor((Date.now() - cs.lastSync) / 1000)) : -1;
                  syncLine = cs.pending
                    ? "Saving…"
                    : ago < 10 ? "Saved · just now"
                    : ago < 60 ? `Saved · ${ago}s ago`
                    : `Saved · ${Math.floor(ago / 60)}m ago`;
                } else {
                  // unauth: either Access not set up, KV not configured, or local dev
                  syncDot  = { bg:"#888", glow:"none" };
                  syncLine = "Local only";
                }

                // Card-count summary (only when showNav).
                let countsBlock = null;
                if (showNav) {
                  const live = phase === "select"
                    ? computeUsable(groups, deckInc, binInc)
                    : usable;
                  const total = live.reduce((s, c) => s + (c.qty || 1), 0);
                  countsBlock = html`
                    <div>${total.toLocaleString()} cards (${live.length.toLocaleString()} unique)</div>
                    <div>
                      ${phase === "select"
                        ? html`<span style=${{ color:"#f0c080" }}>pending — confirm to update</span>`
                        : html`${cmdrs.length} commanders`}
                    </div>
                  `;
                }

                return html`
                  <div style=${{ fontSize:11, color:"rgba(255,255,255,0.65)", textAlign:"right" }}>
                    ${countsBlock}
                    <div title=${syncLine} style=${{
                      display:"inline-flex", alignItems:"center", gap:6,
                      marginTop: countsBlock ? 4 : 0,
                      padding:"3px 9px", borderRadius:12,
                      background:"rgba(0,0,0,0.18)", fontSize:10,
                    }}>
                      <span style=${{
                        width:8, height:8, borderRadius:"50%",
                        background: syncDot.bg,
                        boxShadow: syncDot.glow !== "none" ? `0 0 6px ${syncDot.glow}` : "none",
                      }}></span>
                      ${cs.email
                        ? html`<span style=${{ color:"rgba(255,255,255,0.85)" }}>${cs.email}</span>
