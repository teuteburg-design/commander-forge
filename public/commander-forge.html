                      if (isLibrary)  return loadFromLibrary(entry);
                      if (isGen)      return loadCollectionDeck(entry);
                      if (isImported) return openImportedDeck(entry, "library");
                    };

                    // Top-right badge identifying the source.
                    const badge = isLibrary  ? { txt:"💾 LIBRARY",   bg:"#cde8c8", col:"#1a5a2a" }
                                : isGen      ? { txt:"🃏 FORGE",     bg:"#f5d8c0", col:"#7a2e0e" }
                                :              { txt:"📦 IMPORTED",  bg:"#dee9f4", col:"#1a4a7a" };
                    // Precon badge appears alongside the source badge once an
                    // imported deck has been enriched and detected as a precon.
                    const preconInfo = deckDataHere?.precon || null;

                    const cmdrLabel = isImported
                      ? (entry.commanderName || "(no commander)")
                      : (selCmdHere?.card?.name || "");
                    const titleLabel = isLibrary
                      ? (entry.deck?.theme || cmdrLabel)
                      : entry.name;

                    return html`
                      <div key=${kind + ":" + (entry.id || entry.name || idx)} class="card" style=${{ position:"relative", overflow:"hidden" }}>

                        <!-- Source badge -->
                        <div style=${{
                          position:"absolute", top:10, right: isLibrary ? 36 : 12, zIndex:1,
                          padding:"2px 8px", borderRadius:10, fontSize:9, fontWeight:700, letterSpacing:0.5,
                          background: badge.bg, color: badge.col,
                        }}>${badge.txt}</div>

                        ${preconInfo && html`
                          <!-- Precon chip — sits below the source badge -->
                          <div title=${`Detected as a precon — all cards from "${preconInfo.setName}" (${preconInfo.setCode.toUpperCase()})${preconInfo.partial ? "; some printings differ" : ""}.`}
                            style=${{
                              position:"absolute", top:30, right: isLibrary ? 36 : 12, zIndex:1,
                              padding:"2px 8px", borderRadius:10, fontSize:9, fontWeight:700, letterSpacing:0.5,
                              background:"#f4ead2", color:"#7a5510", border:"1px solid #d8c090",
                              maxWidth:160, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                            }}>
                            🎁 ${preconInfo.partial ? "MOSTLY " : ""}${preconInfo.setCode.toUpperCase()}
                          </div>
                        `}

                        ${isLibrary && html`
                          <button onClick=${e => { e.stopPropagation(); deleteFromLibrary(entry.id); }}
                            title="Remove from library"
                            style=${{
                              position:"absolute", top:10, right:10, zIndex:2,
                              background:"transparent", border:"none", cursor:"pointer",
                              fontSize:16, color:"#c09070", lineHeight:1, padding:4,
                            }}
                            onMouseOver=${e => { e.currentTarget.style.color="#a03010"; }}
                            onMouseOut=${e  => { e.currentTarget.style.color="#c09070"; }}>✕</button>
                        `}

                        <!-- Commander row -->
                        <div style=${{ display:"flex", gap:12, marginBottom:12, cursor:"pointer", marginTop:12 }}
                          onClick=${onOpen}>
                          ${img
                            ? html`<img src=${img} alt=${cmdrLabel}
                                style=${{ width:80, borderRadius:8, flexShrink:0,
                                  boxShadow:"0 2px 10px rgba(0,0,0,0.18)" }} />`
                            : html`<div style=${{
                                width:80, height:112, borderRadius:8, flexShrink:0,
                                background:"#f0e4d0", border:"1px solid #d8c090",
                                display:"flex", alignItems:"center", justifyContent:"center",
                                fontSize:24, color:"#a08868",
                              }}>${isImported ? "📦" : "🃏"}</div>`}
                          <div style=${{ flex:1, minWidth:0 }}>
                            <div style=${{ fontSize:9, letterSpacing:3, color:"#8a5010",
                              textTransform:"uppercase", fontWeight:700, marginBottom:3 }}>
                              ${isImported ? "Imported Deck" : "Commander"}
                            </div>
                            <div style=${{ fontSize:14, fontWeight:700, color:"#3a1a00",
                              lineHeight:1.3, marginBottom:4,
                              whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                              paddingRight: isLibrary ? 0 : 60 }}>
                              ${isImported ? titleLabel : cmdrLabel}
                            </div>
                            <div style=${{ display:"flex", gap:4, flexWrap:"wrap", alignItems:"center", marginBottom:5 }}>
                              ${ci.map(c => html`<${Pip} key=${c} c=${c} />`)}
                              ${sf.mana_cost && html`
                                <span style=${{ fontSize:10, color:"#5a3a1a", background:"#fff",
                                  padding:"1px 6px", borderRadius:6, border:"1px solid #d8c090",
                                  fontFamily:"monospace" }}>${sf.mana_cost}</span>
                              `}
                            </div>
                            ${(!isImported || isEnriched) && html`
                              <div style=${{ fontSize:11, color:"#5a2a08", fontStyle:"italic", marginBottom:3 }}>
                                ${isLibrary ? (entry.deck?.theme || "")
                                  : (deckDataHere?.theme || entry.name)}
                              </div>
                            `}
                            ${isImported && !isEnriched && entry.commanderName && html`
                              <div style=${{ fontSize:11, color:"#5a2a08", fontStyle:"italic", marginBottom:3 }}>
                                Commander: ${entry.commanderName}
                              </div>
                            `}
                            <div style=${{ fontSize:11, color:"#9a7a5a" }}>
                              ${total} cards${(!isImported || isEnriched) ? ` · ${lands} lands` : ""}${date ? " · " + date : ""}
                            </div>
                          </div>
                        </div>

                        ${(!isImported || isEnriched) && html`
                          <!-- Mini mana curve (available once deckData exists) -->
                          <div style=${{ borderTop:"1px solid #e8d8b8", paddingTop:10 }}>
                            <div style=${{ fontSize:9, letterSpacing:2, color:"#8a5010",
                              textTransform:"uppercase", fontWeight:700, marginBottom:6 }}>Mana Curve</div>
                            <div style=${{ display:"flex", gap:4, alignItems:"flex-end", height:48 }}>
                              ${buckets.map((n, i) => html`
                                <div key=${i} style=${{ flex:1, display:"flex", flexDirection:"column",
                                  alignItems:"center", gap:2 }}>
                                  <div style=${{ fontSize:9, color:"#5a3a1a",
                                    visibility: n > 0 ? "visible" : "hidden" }}>${n}</div>
                                  <div style=${{
                                    width:"100%",
                                    height: `${Math.round((n / maxB) * 36)}px`,
                                    minHeight: n > 0 ? 3 : 0,
                                    borderRadius:"3px 3px 0 0",
                                    background:"linear-gradient(180deg,#c05020,#7a2e0e)",
                                  }}></div>
                                  <div style=${{ fontSize:9, color:"#9a7a5a" }}>${i < 7 ? i : "7+"}</div>
                                </div>
                              `)}
                            </div>
                          </div>

                          <!-- Category chip list -->
                          <div style=${{ display:"flex", gap:5, flexWrap:"wrap", marginTop:10 }}>
                            ${(deckDataHere?.categories || []).map(cat => html`
                              <span key=${cat.name} style=${{
                                fontSize:10, padding:"2px 8px", borderRadius:10,
                                background:"#f0e4d0", color:"#6a3a10",
                                border:"1px solid #d8c0a0",
                              }}>${cat.name} ${cat.cards.length}</span>
                            `)}
                          </div>
                        `}

                        ${isImported && !isEnriched && html`
                          <!-- Imported decks not yet enriched — show a hint that
                               clicking will pull Scryfall + EDHRec + Spellbook data. -->
                          <div style=${{
                            borderTop:"1px solid #e8d8b8", paddingTop:10, marginTop:4,
                            fontSize:11, color:"#5a7a3a", lineHeight:1.6,
                          }}>
                            ✨ <strong>Click to enrich</strong> — fetches Scryfall card data,
                            EDHRec synergy suggestions, and Commander Spellbook combos.
                            Cached after first open.
                          </div>
                        `}

                        <button onClick=${onOpen}
                          style=${{ ...btn, width:"100%", marginTop:12, padding:"9px", fontSize:12 }}>
                          View Full Deck →
                        </button>
                      </div>
                    `;
                  })}
                </div>
              `}
            </div>
          `;
          })()}

          <!-- ── ERROR ─────────────────────────────────────────────────── -->
          ${phase === "error" && html`
            <div style=${{ marginTop:48 }}>
              <div style=${{ textAlign:"center", marginBottom:24 }}>
                <div style=${{ fontSize:40, marginBottom:12 }}>⚠️</div>
                <div style=${{ color:"#c03020", fontSize:13, maxWidth:520,
                  margin:"0 auto 18px", lineHeight:1.8 }}>${error}</div>
                <div style=${{ display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap" }}>
                  <button onClick=${() => { setPhase("ready"); setError(""); }} style=${btn}>Try Again</button>
                  ${safeParse.lastRaw && html`
                    <button
                      onClick=${async () => {
                        try { await navigator.clipboard.writeText(safeParse.lastRaw); }
                        catch {}
                      }}
                      style=${btnSec}>📋 Copy raw AI response</button>
                  `}
                </div>
              </div>

              ${log.length > 0 && html`
                <div style=${{ maxWidth:760, margin:"0 auto 16px" }}>
                  <div style=${label}>Build log</div>
                  <${LogBox} log=${log} />
                </div>
              `}

              ${safeParse.lastRaw && html`
                <details style=${{ maxWidth:760, margin:"0 auto",
                  background:"#fff8f0", border:"1px solid #d8c090",
                  borderRadius:10, padding:"10px 14px" }}>
                  <summary style=${{ cursor:"pointer", fontSize:12, fontWeight:600, color:"#7a3010" }}>
                    Raw AI response (${safeParse.lastRaw.length.toLocaleString()} chars) — click to expand
                  </summary>
                  <pre style=${{
                    marginTop:10, padding:"10px 12px",
                    background:"#1e0f00", color:"#e0d0a0",
                    borderRadius:6, fontSize:11, lineHeight:1.5,
                    maxHeight:400, overflow:"auto", whiteSpace:"pre-wrap",
                    wordBreak:"break-word", fontFamily:"ui-monospace, Menlo, monospace",
                  }}>${safeParse.lastRaw}</pre>
                </details>
              `}
            </div>
          `}

        </div>
      </div>

      <!-- ── Back to top button ───────────────────────────────────────────── -->
      ${scrolled && html`
        <button
          onClick=${() => window.scrollTo({ top: 0, behavior: "smooth" })}
          title="Back to top"
          style=${{
            position:"fixed", bottom:28, right:28, zIndex:1000,
            width:44, height:44, borderRadius:"50%", border:"none",
            background:"linear-gradient(135deg,#7a2e0e,#a84020)",
            color:"#fff8f0", fontSize:20, cursor:"pointer",
            boxShadow:"0 4px 18px rgba(122,46,14,0.45)",
            display:"flex", alignItems:"center", justifyContent:"center",
            animation:"fadeIn .2s ease", fontFamily:"inherit", lineHeight:1,
          }}>↑</button>
      `}

      <!-- (commander sidebar now rendered inline as sticky flex column) -->

      <!-- ── Card tooltip popup ──────────────────────────────────────────── -->
      ${cardTooltip && html`
        <div style=${{
          position:"fixed", left:cardTooltip.x, top:cardTooltip.y,
          zIndex:9999, pointerEvents:"none",
          boxShadow:"0 10px 40px rgba(0,0,0,0.55)",
          borderRadius:16, overflow:"hidden",
          border:"2px solid #c07030",
          background:"#1a0a00",
          animation:"fadeIn .15s ease",
        }}>
          <img src=${cardTooltip.img} alt=${cardTooltip.name}
            style=${{ width:290, display:"block" }}
            onError=${e => { setCardTooltip(null); }} />
        </div>
      `}
    `;
  }

  render(html`<${App} />`, document.getElementById("root"));
</script>
</body>
</html>
