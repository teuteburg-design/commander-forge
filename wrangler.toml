# Cloudflare Workers config for Commander Forge.
#
# Bindings:
#   ASSETS — serves static files from ./public  (commander-forge.html, index.html)
#   STATE  — Cloudflare KV namespace storing per-user app state for cross-device sync.
#            See worker/index.js → /api/state endpoints.
#
# The Worker (worker/index.js) also proxies a few CORS-blocked third-party APIs
# from the same origin — see the routes table at the top of that file.
#
# Deployed automatically by Cloudflare's git integration on push to main.

name = "commander-forge"
main = "worker/index.js"
compatibility_date = "2025-04-01"
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

# ── Cloud sync KV namespace ─────────────────────────────────────────────────
# Disabled by default — Cloudflare rejects the deploy if `id` is a placeholder.
# To enable cross-device sync:
#   1. `wrangler kv namespace create CMDR_FORGE_STATE`  (or use the dashboard)
#   2. Uncomment the block below and paste the real `id`
#   3. Commit and push — Cloudflare redeploys with the binding live
# See docs/SYNC_SETUP.md for the full walkthrough. While disabled, the Worker
# returns 503 from /api/state and the client falls back to localStorage-only.
#
# [[kv_namespaces]]
# binding = "STATE"
# id = "PASTE_REAL_KV_NAMESPACE_ID_HERE"
# preview_id = "PASTE_PREVIEW_KV_NAMESPACE_ID_HERE"   # only needed for `wrangler dev`

# Note
# - `not_found_handling = "single-page-application"` means unknown paths fall
#   through to /index.html so the SPA's hash routing keeps working.
