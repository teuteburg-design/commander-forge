# Cloudflare Workers config for Commander Forge.
#
# One binding:
#   ASSETS — serves static files from ./public  (commander-forge.html, index.html)
#
# The Worker (worker/index.js) also proxies a few CORS-blocked third-party APIs
# from the same origin — see the routes table at the top of that file.
#
# Deployed automatically by Cloudflare's git integration on push to main.

name = "commander-forge"
main = "worker/index.js"
compatibility_date = "2025-04-01"
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Note
# - `not_found_handling = "single-page-application"` means unknown paths fall
#   through to /index.html so the SPA's hash routing keeps working.
